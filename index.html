<!DOCTYPE html>
<html lang="fr" data-theme="nature-vibrant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vie Équilibrée - Fandry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* Typographie unique et ultra-lisible */
            --font-title: 'Inter', sans-serif;
            --font-text: 'Inter', sans-serif;
            --font-mono: 'Inter', monospace; /* Inter gère très bien les chiffres */
            
            --sidebar-width: 260px;
            --right-panel-width: 350px;
            --radius: 16px;
            --transition: all 0.2s ease;
            
            /* Ombres douces façon "Clean Fintech" */
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --btn-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        /* Thème "Clean Fintech" (Clarté absolue) */
        [data-theme="nature-vibrant"] { 
            --bg: #F8FAFC;           /* Slate 50 - Fond gris/bleu très clair */
            --surface: #FFFFFF;      /* Blanc pur pour la lecture */
            --surface-hover: #F1F5F9; 
            --text: #0F172A;         /* Slate 900 - Très contrasté mais pas noir pur */
            --text-muted: #64748B;   /* Slate 500 */
            --primary: #4F46E5;      /* Indigo vibrant */
            --secondary: #10B981;    /* Émeraude doux */
            --accent: #F43F5E;       /* Rose/Rouge vif */
            --border: #E2E8F0;       /* Ligne de séparation très fine */
            --gold: #F59E0B; 
            --green: #10B981; 
            --danger: #EF4444; 
            --header-text: #0F172A; 
        }

        /* Thème sombre ajusté pour la lisibilité */
        [data-theme="dark"] { --bg: #0F172A; --surface: #1E293B; --surface-hover: #334155; --text: #F8FAFC; --text-muted: #94A3B8; --primary: #6366F1; --secondary: #10B981; --accent: #F43F5E; --border: #334155; --gold: #F59E0B; --green: #10B981; --danger: #EF4444; --header-text: #F8FAFC; }
        
        /* Fallback pour les autres thèmes */
        [data-theme="light"], [data-theme="ocean-ice"], [data-theme="deep-blue"], [data-theme="terracotta"], [data-theme="neutral-nude"], [data-theme="forest"] {
            --bg: #F8FAFC; --surface: #FFFFFF; --surface-hover: #F1F5F9; --text: #0F172A; --text-muted: #64748B; --primary: #4F46E5; --secondary: #10B981; --accent: #F43F5E; --border: #E2E8F0; --gold: #F59E0B; --green: #10B981; --danger: #EF4444; --header-text: #0F172A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-text); background: var(--bg); color: var(--text); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; font-size: 15px; -webkit-font-smoothing: antialiased; }
        
        h1, h2, h3, h4 { font-family: var(--font-title); font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
        .mono { font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: -0.01em; } /* Tabular nums aligne parfaitement les chiffres */
        
        /* Boutons modernes */
        button { cursor: pointer; background: var(--primary); color: #ffffff; padding: 12px 20px; border-radius: 10px; font-weight: 600; font-family: var(--font-text); border: none; box-shadow: var(--btn-shadow); transition: var(--transition); font-size: 0.95em; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 8px -1px rgba(79, 70, 229, 0.3); }
        button:active { transform: translateY(0); box-shadow: 0 2px 4px -1px rgba(79, 70, 229, 0.2); }
        button.outline { background: transparent; color: var(--text); border: 1px solid var(--border); box-shadow: none; }
        button.outline:hover { background: var(--surface-hover); }
        button.danger { background: var(--danger); box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); }
        button.small { padding: 6px 12px; font-size: 0.85em; border-radius: 8px; box-shadow: none; }
        
        /* Inputs épurés */
        input, select, textarea { width: 100%; padding: 12px 16px; margin-bottom: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font-text); transition: var(--transition); font-size: 0.95em; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        textarea { resize: vertical; min-height: 100px; line-height: 1.5; }

        /* Layout */
        #app-container { display: flex; flex: 1; height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; overflow-y: auto; z-index: 10; }
        .sidebar a { padding: 12px 24px; color: var(--text-muted); text-decoration: none; display: block; font-weight: 500; font-size: 0.95em; transition: var(--transition); border-right: 3px solid transparent; }
        .sidebar a:hover { background: var(--bg); color: var(--text); }
        .sidebar a.active { color: var(--primary); background: rgba(79, 70, 229, 0.05); border-right-color: var(--primary); font-weight: 600; }
        .sidebar h4 { padding: 10px 24px; margin-top: 20px; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; }
        .sidebar .admin-tag { background: var(--danger); color: #fff; font-size: 0.65em; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 70px; background: var(--bg); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 5; }
        .hamburger { display: none; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 1.2rem; padding: 8px 12px; border-radius: 8px; }
        .topbar-clock { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--text-muted); }
        
        .content-area { flex: 1; overflow-y: auto; padding: 32px; padding-bottom: 100px; }
        .right-panel { width: var(--right-panel-width); background: var(--surface); border-left: 1px solid var(--border); padding: 32px; overflow-y: auto; display: none; }
        @media (min-width: 1024px) { .right-panel { display: block; } }

        /* Bottom Nav Mobile */
        .bottom-nav { display: none; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 10px 20px; align-items: center; justify-content: space-between; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .bottom-nav button { background: transparent; color: var(--text-muted); font-size: 1.4rem; padding: 10px; border-radius: 12px; flex: 1; box-shadow: none; }
        .bottom-nav button:hover, .bottom-nav button.active { color: var(--primary); transform: none; }
        .bottom-nav .fab { background: var(--primary); color: white; width: 56px; height: 56px; max-width: 56px; border-radius: 50%; transform: translateY(-20px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); font-size: 1.5rem; display: flex; justify-content: center; align-items: center; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.mobile-open { display: flex; position: fixed; top: 0; left: 0; bottom: 0; z-index: 600; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
            .sidebar-overlay { display: none; }
            .sidebar-overlay.show { display: block; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 590; backdrop-filter: blur(2px); }
            .bottom-nav { display: flex; }
            .hamburger { display: block; }
            .topbar { padding: 0 20px; }
            .content-area { padding: 20px; }
        }

        /* Cartes (Cards) - Aérées et propres */
        .card { background: var(--surface); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); box-shadow: var(--card-shadow); }
        .card h3 { margin-bottom: 20px; font-size: 1.15rem; display:flex; align-items:center; justify-content:space-between; color: var(--text); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; gap: 16px; } }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-center { text-align: center; }
        
        /* Strip Calendrier */
        .calendar-strip { display: flex; overflow-x: auto; padding-bottom: 10px; gap: 10px; scrollbar-width: none; margin-bottom: 10px; }
        .calendar-strip::-webkit-scrollbar { display: none; }
        .day-box { min-width: 55px; text-align: center; padding: 12px 5px; border-radius: 12px; background: transparent; cursor: pointer; color: var(--text-muted); font-weight: 500; transition: var(--transition); border: 1px solid transparent; }
        .day-box:hover { background: var(--surface); border-color: var(--border); }
        .day-box.active { background: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .day-box .dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; margin: 6px auto 0; display: none; }
        .day-box.active .dot { background: #fff; }
        .day-box.has-data .dot { display: block; }

        /* Jauges Progressives Minimalistes */
        .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; border-radius: 4px; }

        .icon-row { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
        .icon-circle { flex: 1; height: 60px; border-radius: 12px; background: var(--bg); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: var(--text); border: 1px solid var(--border); }
        
        .score-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid var(--bg); margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; flex-direction: column; position: relative; }
        /* Astuce visuelle pour la jauge circulaire */
        .score-circle::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 6px solid var(--primary); border-top-color: transparent; border-right-color: transparent; transform: rotate(-45deg); }

        /* Tâches Listes */
        .task-item { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; font-size: 0.95em; transition: var(--transition); }
        .task-item:last-child { border-bottom: none; }
        .task-item input[type="checkbox"] { width: 20px; height: 20px; margin: 0 12px 0 0; accent-color: var(--primary); cursor: pointer; border-radius: 6px; }
        .task-item.done { opacity: 0.5; }
        .task-item.done .tname { text-decoration: line-through; }
        .task-item span.tname { flex: 1; font-weight: 500; }
        
        /* Pastilles de priorité */
        .task-item::before { display: none; } /* On enlève le carré stylisé d'avant */
        .task-prio { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        .task-prio.haute { background: var(--danger); box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }
        .task-prio.moyenne { background: var(--gold); }
        .task-prio.basse { background: var(--text-muted); }

        /* Tranches Budgétaires */
        .tranche-head { padding: 16px; font-weight: 600; color: var(--text); display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border); font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.05em; }
        .tranche-body { padding: 0 16px 16px 16px; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--card-shadow); }
        .tranche-row { display:flex; justify-content:space-between; padding: 12px 0; font-size: 0.95em; border-bottom: 1px solid var(--bg); color: var(--text-muted); }
        .tranche-row:last-child { border-bottom:none; }
        .tranche-row .mono { color: var(--text); }
        .tranche-total { display:flex; justify-content:space-between; background: var(--bg); padding: 12px 16px; border-radius: 8px; margin-top: 8px; font-weight: 600; color: var(--text); }

        .metric-tile { background: var(--bg); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
        .analyse-section h4 { font-size: 0.9rem; color: var(--text); margin-bottom: 12px; font-weight: 600; }
        .analyse-section p { font-size: 0.9em; line-height: 1.6; color: var(--text-muted); }
        
        .mood-row { display:flex; gap:8px; justify-content: center; margin-bottom:16px; }
        .mood-btn { font-size: 2rem; padding: 8px; border-radius: 50%; background: transparent; border: none; box-shadow: none; filter: grayscale(100%); opacity: 0.4; transition: var(--transition); }
        .mood-btn:hover, .mood-btn.sel { filter: grayscale(0%); opacity: 1; transform: scale(1.1); background: var(--bg); }
        
        .event-row { display:flex; align-items:flex-start; gap:16px; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .event-row:last-child { border-bottom: none; }
        .event-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; flex-shrink:0; }
        
        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); padding: 20px; }
        .auth-box { background: var(--surface); padding: 40px 32px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); }
        .auth-switch { margin-top: 20px; font-size: 0.9em; color: var(--text-muted); cursor: pointer; }
        .auth-switch span { color: var(--primary); font-weight: 600; }

        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1E293B; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 500; font-size: 0.9em; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); opacity:0; transition: 0.3s; z-index: 9000; pointer-events:none; white-space:nowrap; }
        .toast-msg.show { opacity:1; transform: translateX(-50%) translateY(0); }
        .error-msg { color: var(--danger); background: #FEF2F2; padding: 12px 16px; border-radius: 8px; border: 1px solid #FECACA; margin-bottom: 16px; font-size: 0.9em; font-weight: 500; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color: var(--primary); margin-bottom: 8px; letter-spacing: -0.05em; font-size: 2rem;">Dealife</h1>
            <p style="margin-bottom: 32px; color: var(--text-muted);" id="auth-sub">Connexion sécurisée</p>
            <input type="text" id="auth-name" placeholder="Prénom" style="display:none;">
            <input type="email" id="auth-email" placeholder="Adresse email">

        </div>
    </div>

    <div id="app-container" style="display: none;">
        
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>
        <nav class="sidebar" id="sidebar">
            <div style="padding: 0 24px 20px;">
                <h2 style="color: var(--text); font-size: 1.5rem; letter-spacing: -0.03em;">Dealife</h2>

            </div>

        <div class="main-wrapper">

            <main class="content-area" id="main-content"></main>

            <button onclick="openMobileSidebar()" id="mob-more">☰</button>
        </nav>
    </div>

    <div class="toast-msg" id="toast-msg"></div>
    
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyAdfIiIMRevlNcyNhueJq2fzRdD53XBT1I",
            authDomain: "mon-outil-budget.firebaseapp.com",
            projectId: "mon-outil-budget",
            storageBucket: "mon-outil-budget.firebasestorage.app",
            messagingSenderId: "528991480334",
            appId: "1:528991480334:web:2bf07bf807e2f9c148aa5f"
        };
        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var db = firebase.firestore();

        var ADMIN_EMAILS = ['fandryjoh@gmail.com', 'fandryjohprog@gmail.com'];
        var MNAMES = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        var MSHORT = ["Jan", "Fév", "Mar", "Avr", "Mai", "Jun", "Jul", "Aoû", "Sep", "Oct", "Nov", "Déc"];
        var DNAMES = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

        var authMode = 'login';

        var State = {
            uid: null,
            email: null,
            activePage: 'jour',
            activeDate: new Date(),
            D: {},
            C: {},
            G: {}
        };

        var defaultC = {
            appName: "Dealife",
            dayBudget: 20000,
            coursesMo: 600000,
            savings: 1000000,
            incRows: ["Salaire principal", "GTV / Studio", "iScale", "Autres revenus"],
            fixedRows: [{n: "Loyer", v: 200000}, {n: "Internet", v: 50000}, {n: "Entretien moto", v: 70000}],
            careRows: [{n: "Vêtements", v: 30000}, {n: "Chaussures", v: 30000}, {n: "Beauté", v: 30000}],
            weekRows: [{n: "Chilling", v: 40000}],
            habitRows: ["Méditation", "Sport", "Lecture", "Eau"],
            theme: "nature-vibrant",
            fontSize: 15
        };
        var defaultG = { taches: [], objectifs: [], journal: {}, events: [], lastAnalyse: null };

        var saveTimeout = null;

        /* ============ HELPERS ============ */
        function escHtml(str) {
            if (str === null || str === undefined) return "";
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        function fmtAr(num) { return isNaN(num) ? "0 Ar" : Number(num).toLocaleString('fr-FR') + " Ar"; }
        function fmtNum(num) { return isNaN(num) ? "0" : Number(num).toLocaleString('fr-FR'); }
        function getMonthKey(date) { var y = date.getFullYear(); var m = date.getMonth() + 1; return y + "-" + (m < 10 ? "0" + m : m); }
        function todayDateKey() {
            var d = State.activeDate;
            var dd = d.getDate(); var mm = d.getMonth() + 1; var yy = d.getFullYear();
            return yy + "-" + (mm < 10 ? "0" + mm : mm) + "-" + (dd < 10 ? "0" + dd : dd);
        }
        function p2(n) { return n < 10 ? "0" + n : "" + n; }

        function ensureC() {
            if (!State.C) State.C = JSON.parse(JSON.stringify(defaultC));
            if (!Array.isArray(State.C.incRows)) State.C.incRows = defaultC.incRows.slice();
            if (!Array.isArray(State.C.fixedRows)) State.C.fixedRows = JSON.parse(JSON.stringify(defaultC.fixedRows));
            if (!Array.isArray(State.C.careRows)) State.C.careRows = JSON.parse(JSON.stringify(defaultC.careRows));
            if (!Array.isArray(State.C.weekRows)) State.C.weekRows = JSON.parse(JSON.stringify(defaultC.weekRows));
            if (!Array.isArray(State.C.habitRows)) State.C.habitRows = defaultC.habitRows.slice();
            if (typeof State.C.dayBudget !== 'number') State.C.dayBudget = defaultC.dayBudget;
            if (typeof State.C.coursesMo !== 'number') State.C.coursesMo = defaultC.coursesMo;
            if (typeof State.C.savings !== 'number') State.C.savings = defaultC.savings;
            if (!State.C.appName) State.C.appName = defaultC.appName;
        }
        function ensureG() {
            if (!State.G) State.G = JSON.parse(JSON.stringify(defaultG));
            if (!Array.isArray(State.G.taches)) State.G.taches = [];
            if (!Array.isArray(State.G.objectifs)) State.G.objectifs = [];
            if (!State.G.journal) State.G.journal = {};
            if (!Array.isArray(State.G.events)) State.G.events = [];
            if (State.G.lastAnalyse === undefined) State.G.lastAnalyse = null;
        }

        function initMonthData(key) {
            if (!State.D[key]) State.D[key] = { days: {}, courses: [], income: [] };
            var md = State.D[key];
            if (!md.days) md.days = {};
            if (!md.courses) md.courses = [];
            if (!md.income) md.income = [];
            return md;
        }
        function getDayData(dayInt) {
            var mk = getMonthKey(State.activeDate);
            var md = initMonthData(mk);
            if (!md.days[dayInt]) md.days[dayInt] = { spendings: [], habits: [], tasks: [], notes: '', mood: '', sleep: 0, water: 0, sport: 0 };
            var dd = md.days[dayInt];
            if (!dd.spendings) dd.spendings = [];
            if (!dd.habits) dd.habits = [];
            if (!dd.tasks) dd.tasks = [];
            if (dd.notes === undefined) dd.notes = '';
            if (dd.mood === undefined) dd.mood = '';
            if (dd.sleep === undefined) dd.sleep = 0;
            if (dd.water === undefined) dd.water = 0;
            if (dd.sport === undefined) dd.sport = 0;
            return dd;
        }
        function dayHasData(dayInt, mk) {
            var md = State.D[mk];
            if (!md || !md.days[dayInt]) return false;
            var dd = md.days[dayInt];
            return (dd.spendings && dd.spendings.length > 0) || (dd.habits && dd.habits.indexOf(true) >= 0) || (dd.tasks && dd.tasks.length > 0);
        }
        function daySpentTotal(dayInt, mk) {
            var md = State.D[mk];
            if (!md || !md.days[dayInt]) return 0;
            var dd = md.days[dayInt], s = 0;
            for (var i = 0; i < dd.spendings.length; i++) s += Number(dd.spendings[i].amt || 0);
            return s;
        }
        function incomeTotalForMonth(mk) {
            ensureC();
            var md = State.D[mk];
            if (!md || !md.income) return 0;
            var s = 0;
            for (var i = 0; i < md.income.length; i++) s += Number(md.income[i] || 0);
            return s;
        }
        function dimeForMonth(mk) { return Math.round(incomeTotalForMonth(mk) / 10); }
        function fixedTotal() { ensureC(); var s = 0; for (var i = 0; i < State.C.fixedRows.length; i++) s += Number(State.C.fixedRows[i].v || 0); return s; }
        function careTotal() { ensureC(); var s = 0; for (var i = 0; i < State.C.careRows.length; i++) s += Number(State.C.careRows[i].v || 0); return s; }
        function weekTotal() { ensureC(); var s = 0; for (var i = 0; i < State.C.weekRows.length; i++) s += Number(State.C.weekRows[i].v || 0); return s; }
        function spentTotalForMonth(mk) {
            var md = State.D[mk];
            if (!md) return 0;
            var s = 0;
            for (var d in md.days) s += daySpentTotal(parseInt(d, 10), mk);
            return s;
        }
        function coursesSpentForMonth(mk) {
            var md = State.D[mk];
            if (!md || !md.courses) return 0;
            var s = 0;
            for (var i = 0; i < md.courses.length; i++) s += Number(md.courses[i].amt || 0);
            return s;
        }
        function habitsStatsForMonth(mk) {
            var md = State.D[mk];
            if (!md) return { done: 0, total: 0 };
            var done = 0, total = 0, nHab = State.C.habitRows.length;
            for (var d in md.days) {
                var dd = md.days[d];
                if (dd.habits) {
                    for (var i = 0; i < nHab; i++) { total++; if (dd.habits[i]) done++; }
                }
            }
            return { done: done, total: total };
        }
        function daysWithDataCount(mk) {
            var md = State.D[mk];
            if (!md) return 0;
            var c = 0;
            for (var d in md.days) if (dayHasData(parseInt(d, 10), mk)) c++;
            return c;
        }
        function avgDaySpend(mk) {
            var c = daysWithDataCount(mk);
            if (!c) return null;
            return Math.round(spentTotalForMonth(mk) / c);
        }

        function toast(msg) {
            var t = document.getElementById('toast-msg');
            if (!t) return;
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._tmr);
            t._tmr = setTimeout(function () { t.classList.remove('show'); }, 2200);
        }

        /* ============ AUTH ============ */
        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'register' : 'login';
            var isReg = authMode === 'register';
            document.getElementById('auth-name').style.display = isReg ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isReg ? "Créer mon compte" : "Se connecter";
            document.getElementById('auth-sub').innerText = isReg ? "Créer un compte" : "Connexion sécurisée";
            document.querySelector('.auth-switch').innerHTML = isReg ? 'Déjà un compte ? <span>Connexion</span>' : 'Pas de compte ? <span>Inscrivez-vous</span>';
            document.getElementById('auth-error').style.display = 'none';
        }
        function appLogin() {
            var errDiv = document.getElementById('auth-error');
            errDiv.style.display = 'none';
            var e = document.getElementById('auth-email').value;
            var p = document.getElementById('auth-pwd').value;
            if (!e || !p) { errDiv.innerText = "Veuillez remplir tous les champs."; errDiv.style.display = 'block'; return; }
            if (authMode === 'register') {
                var name = document.getElementById('auth-name').value;
                auth.createUserWithEmailAndPassword(e, p).then(function (cred) {
                    if (name) return cred.user.updateProfile({ displayName: name });
                }).catch(function (err) {
                    errDiv.innerText = err.message;
                    errDiv.style.display = 'block';
                });
            } else {
                auth.signInWithEmailAndPassword(e, p).catch(function (err) {
                    errDiv.innerText = err.message;
                    errDiv.style.display = 'block';
                });
            }
        }
        function appGoogleLogin() {
            var provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(function (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    var errDiv = document.getElementById('auth-error');
                    errDiv.innerText = err.message;
                    errDiv.style.display = 'block';
                }
            });
        }
        function appLogout() { auth.signOut(); }

        auth.onAuthStateChanged(function (user) {
            if (user) {
                State.uid = user.uid;
                State.email = user.email;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('user-chip').innerText = user.displayName || user.email;
                var navAdmin = document.getElementById('nav-admin');
                if (navAdmin) navAdmin.style.display = ADMIN_EMAILS.indexOf(user.email) >= 0 ? 'block' : 'none';
                loadData();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        /* ============ DATA LOAD / SAVE ============ */
        function loadData() {
            db.collection("users").doc(State.uid).collection("data").doc("main").get().then(function (doc) {
                if (doc.exists) {
                    var data = doc.data();
                    State.C = data.C || JSON.parse(JSON.stringify(defaultC));
                    State.D = data.D || {};
                    State.G = data.G || JSON.parse(JSON.stringify(defaultG));
                } else {
                    State.C = JSON.parse(JSON.stringify(defaultC));
                    State.D = {};
                    State.G = JSON.parse(JSON.stringify(defaultG));
                }
                ensureC(); ensureG();
                applyTheme();

                var lastPage = 'jour';
                try { lastPage = localStorage.getItem('vieEqLastPage') || 'jour'; } catch (e) { console.warn("localStorage bloqué"); }
                nav(lastPage);
                setInterval(tickClock, 30000);
                tickClock();
            }).catch(function (err) {
                var c = document.getElementById('main-content');
                c.innerHTML = "<div class='error-msg'>Erreur de base de données: " + escHtml(err.message) + "</div>";
            });
        }

        function triggerSave() {
            document.getElementById('sync-status').innerText = "Syncing...";
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(function () {
                db.collection("users").doc(State.uid).collection("data").doc("main").set({
                    C: State.C, D: State.D, G: State.G
                }).then(function () {
                    document.getElementById('sync-status').innerText = "En ligne ✓";
                    renderRightPanel();
                }).catch(function (err) {
                    document.getElementById('sync-status').innerText = "Erreur de sync";
                    console.error(err);
                });
            }, 800);
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', State.C.theme || 'nature-vibrant');
            var fSize = State.C.fontSize || 15;
            document.body.style.fontSize = fSize + 'px';
        }

        function tickClock() {
            var now = new Date();
            var el = document.getElementById('topbar-clock');
            if (el) el.textContent = p2(now.getHours()) + ':' + p2(now.getMinutes());
        }

        /* ============ MOBILE SIDEBAR ============ */
        function openMobileSidebar() {
            document.getElementById('sidebar').classList.add('mobile-open');
            document.getElementById('sidebar-overlay').classList.add('show');
        }
        function closeMobileSidebar() {
            document.getElementById('sidebar').classList.remove('mobile-open');
            document.getElementById('sidebar-overlay').classList.remove('show');
        }

        /* ============ NAVIGATION ============ */
        function nav(page) {
            State.activePage = page;
            try { localStorage.setItem('vieEqLastPage', page); } catch (e) {}
            closeMobileSidebar();

            var links = document.querySelectorAll('.sidebar a');
            for (var i = 0; i < links.length; i++) links[i].classList.remove('active');
            var activeLink = document.getElementById('nav-' + page);
            if (activeLink) activeLink.classList.add('active');
            var mobBtns = document.querySelectorAll('.bottom-nav button');
            for (var j = 0; j < mobBtns.length; j++) mobBtns[j].classList.remove('active');
            var mobActive = document.getElementById('mob-' + page);
            if (mobActive) mobActive.classList.add('active');

            document.getElementById('current-month-display').innerText = MNAMES[State.activeDate.getMonth()] + " " + State.activeDate.getFullYear();

            var content = document.getElementById('main-content');
            content.innerHTML = "";

            try {
                if (page === 'jour') renderJour(content);
                else if (page === 'semaine') renderSemaine(content);
                else if (page === 'mois') renderMois(content);
                else if (page === 'courses') renderCourses(content);
                else if (page === 'revenus') renderRevenus(content);
                else if (page === 'stats') renderStats(content);
                else if (page === 'taches') renderTaches(content);
                else if (page === 'objectifs') renderObjectifs(content);
                else if (page === 'journal') renderJournal(content);
                else if (page === 'bienetre') renderBienetre(content);
                else if (page === 'planning') renderPlanning(content);
                else if (page === 'settings') renderSettings(content);
                else if (page === 'admin') renderAdmin(content);
                else content.innerHTML = "<div class='card'><p>Page introuvable (" + escHtml(page) + ").</p></div>";
            } catch (e) {
                console.error(e);
                content.innerHTML = "<div class='error-msg'>Erreur de rendu: " + escHtml(e.message) + "</div>";
            }
            renderRightPanel();
        }

        function changeMonth(delta) {
            State.activeDate.setMonth(State.activeDate.getMonth() + delta);
            nav(State.activePage);
        }
        function setDate(d) { State.activeDate.setDate(d); nav('jour'); }

        /* ============ PAGE: JOUR ============ */
        function renderJour(container) {
            var h = [];
            var year = State.activeDate.getFullYear();
            var month = State.activeDate.getMonth();
            var daysInMonth = new Date(year, month + 1, 0).getDate();
            var todayInt = State.activeDate.getDate();
            var mk = getMonthKey(State.activeDate);
            var md = initMonthData(mk);

            h.push("<div class='calendar-strip'>");
            for (var i = 1; i <= daysInMonth; i++) {
                var dClass = "day-box";
                if (i === todayInt) dClass += " active";
                if (dayHasData(i, mk)) dClass += " has-data";
                h.push("<div class='" + dClass + "' onclick='setDate(" + i + ")'>" + i + "<div class='dot'></div></div>");
            }
            h.push("</div>");

            var dayData = getDayData(todayInt);
            var hDone = 0;
            for (var hh = 0; hh < dayData.habits.length; hh++) if (dayData.habits[hh]) hDone++;
            var hTotal = State.C.habitRows.length;

            h.push("<div class='icon-row'>");
            h.push("<div class='icon-circle'>" + (dayData.mood || '🧘') + "</div>");
            h.push("<div class='icon-circle' style='color:var(--secondary);'>" + (dayData.sport > 0 ? '🏃' : '⭕') + "</div>");
            h.push("<div class='icon-circle' style='color:var(--accent);'>💧 " + (dayData.water || 0) + "</div>");
            h.push("<div class='icon-circle' style='color:var(--primary);'>" + hDone + "/" + hTotal + "</div>");
            h.push("</div>");

            h.push("<div class='grid-2'>");

            // BUDGET
            h.push("<div class='card'><h3>Budget journalier</h3>");
            var env = State.C.dayBudget || 20000;
            var spent = daySpentTotal(todayInt, mk);
            var reste = env - spent;
            h.push("<h2 style='color:" + (reste < 0 ? 'var(--danger)' : 'var(--text)') + "; font-size:1.8rem; margin-bottom:4px;' class='mono'>" + fmtAr(reste) + "</h2>");
            h.push("<span style='color:var(--text-muted); font-size:0.85em;'>Restant sur " + fmtAr(env) + "</span>");
            h.push("<div class='progress-bar' style='margin-bottom:20px;'><div class='progress-fill' style='width:" + Math.min(100, (spent / env) * 100) + "%; " + (reste < 0 ? "background:var(--danger);" : "") + "'></div></div>");
            
            h.push("<div class='flex-between' style='gap:12px; margin-bottom:12px;'>");
            h.push("<input type='text' id='dep-desc' placeholder='Description' style='margin:0; flex:2;'>");
            h.push("<input type='number' id='dep-amt' placeholder='0' style='margin:0; flex:1;'>");
            h.push("</div>");
            h.push("<button onclick='addSpending(" + todayInt + ")' style='width:100%; margin-bottom:16px;'>Ajouter dépense</button>");
            
            for (var k = 0; k < dayData.spendings.length; k++) {
                var s = dayData.spendings[k];
                h.push("<div class='flex-between' style='font-size:0.9em; margin-bottom:8px; padding:12px; background:var(--bg); border-radius:8px;'><span>" + escHtml(s.desc) + "</span><span class='mono' style='font-weight:600;'>" + fmtAr(s.amt) + " <button style='background:transparent; border:none; color:var(--text-muted); padding:0 0 0 12px; box-shadow:none;' onclick='delSpending(" + todayInt + "," + k + ")'>✕</button></span></div>");
            }
            h.push("</div>");

            // HABITUDES
            h.push("<div class='card'><h3>Habitudes</h3>");
            for (var hidx = 0; hidx < State.C.habitRows.length; hidx++) {
                var hName = State.C.habitRows[hidx];
                var isChecked = dayData.habits[hidx] ? "checked" : "";
                h.push("<div class='task-item " + (dayData.habits[hidx] ? "done" : "") + "' style='cursor:pointer;'><input type='checkbox' " + isChecked + " onchange='toggleHabit(" + todayInt + "," + hidx + ",this.checked)'><span class='tname'>" + escHtml(hName) + "</span></div>");
            }
            h.push("</div>");

            h.push("</div>"); // fin grid-2

            // TACHES DU JOUR
            h.push("<div class='card'><h3>Tâches du jour</h3>");
            for (var ti = 0; ti < dayData.tasks.length; ti++) {
                var task = dayData.tasks[ti];
                h.push("<div class='task-item " + (task.done ? 'done' : '') + "'><input type='checkbox' " + (task.done ? 'checked' : '') + " onchange='toggleDayTask(" + todayInt + "," + ti + ",this.checked)'><span class='tname'>" + escHtml(task.n) + "</span><button class='small outline' style='border:none; padding:4px;' onclick='delDayTask(" + todayInt + "," + ti + ")'>✕</button></div>");
            }
            h.push("<div class='flex-between' style='gap:12px; margin-top:16px;'><input type='text' id='dtask-name' placeholder='Ajouter une tâche…' style='margin-bottom:0;'><button onclick='addDayTask(" + todayInt + ")'>Ajouter</button></div>");
            h.push("</div>");

            // BIEN-ETRE RAPIDE
            h.push("<div class='card'><h3>Santé express</h3>");
            h.push("<div class='grid-2'>");
            h.push("<div><label style='font-size:0.85em;color:var(--text-muted);font-weight:500; display:block; margin-bottom:6px;'>Sommeil (h)</label><input type='number' min='0' max='24' value='" + (dayData.sleep || '') + "' onchange='setBienetreField(" + todayInt + ",\"sleep\",this.value)'></div>");
            h.push("<div><label style='font-size:0.85em;color:var(--text-muted);font-weight:500; display:block; margin-bottom:6px;'>Eau (verres)</label><input type='number' min='0' value='" + (dayData.water || '') + "' onchange='setBienetreField(" + todayInt + ",\"water\",this.value)'></div>");
            h.push("</div></div>");

            // NOTES
            h.push("<div class='card'><h3>Journal express</h3><textarea onchange='setDayNotes(" + todayInt + ",this.value)' placeholder='Une note sur la journée…'>" + escHtml(dayData.notes) + "</textarea></div>");

            container.innerHTML = h.join("");
        }

        /* ============ PAGE: SEMAINE ============ */
        function renderSemaine(container) {
            var h = [];
            var year = State.activeDate.getFullYear();
            var month = State.activeDate.getMonth();
            var daysInMonth = new Date(year, month + 1, 0).getDate();
            var todayInt = State.activeDate.getDate();
            var dow = new Date(year, month, todayInt).getDay();
            dow = dow === 0 ? 6 : dow - 1;
            var monday = Math.max(1, todayInt - dow);
            var mk = getMonthKey(State.activeDate);

            var hSum = 0, hTot = 0, spendSum = 0;
            h.push("<div class='card'><h3>Bilan Hebdomadaire</h3>");
            for (var i = 0; i < 7; i++) {
                var dd = monday + i;
                if (dd < 1 || dd > daysInMonth) continue;
                var dayData = getDayData(dd);
                var dHabDone = 0;
                for (var hh = 0; hh < dayData.habits.length; hh++) if (dayData.habits[hh]) dHabDone++;
                hSum += dHabDone; hTot += State.C.habitRows.length;
                var sp = daySpentTotal(dd, mk);
                spendSum += sp;
                var dowName = DNAMES[new Date(year, month, dd).getDay() === 0 ? 6 : new Date(year, month, dd).getDay() - 1];
                var isToday = dd === todayInt;
                
                h.push("<div class='flex-between' style='padding:16px; margin-bottom:12px; border-radius:12px; cursor:pointer; background: " + (isToday ? "var(--primary)" : "var(--bg)") + "; color: " + (isToday ? "#fff" : "inherit") + "; transition: transform 0.2s ease;' onclick='setDate(" + dd + ")'>");
                h.push("<span style='font-weight:600;'>" + dowName + " " + dd + "</span>");
                h.push("<span class='mono' style='opacity:0.9;'>✓" + dHabDone + "/" + State.C.habitRows.length + " · " + fmtNum(sp) + " Ar</span>");
                h.push("</div>");
            }
            h.push("</div>");

            var wkScore = hTot > 0 ? Math.round((hSum / hTot) * 100) : 0;
            h.push("<div class='card text-center'><h3 style='justify-content:center;'>Score de complétion</h3>");
            h.push("<div class='score-circle' style='margin-top:20px;'><strong style='font-size:2em;' class='mono'>" + wkScore + "%</strong></div>");
            h.push("<p class='mono' style='color:var(--text-muted);'>" + fmtNum(spendSum) + " Ar dépensés cette semaine</p></div>");

            container.innerHTML = h.join("");
        }

        /* ============ PAGE: MOIS ============ */
        function renderMois(container) {
            var h = [];
            var mk = getMonthKey(State.activeDate);
            var daysInMonth = new Date(State.activeDate.getFullYear(), State.activeDate.getMonth() + 1, 0).getDate();
            var inc = incomeTotalForMonth(mk);
            var dime = dimeForMonth(mk);
            var spend = spentTotalForMonth(mk);
            var fixed = fixedTotal(), care = careTotal(), week4 = weekTotal() * 4, dayMo = State.C.dayBudget * daysInMonth;
            var cSpend = coursesSpentForMonth(mk);
            var grandTotal = fixed + care + week4 + dayMo + State.C.savings + State.C.coursesMo + dime;
            var hStats = habitsStatsForMonth(mk);
            var hPct = hStats.total > 0 ? Math.round((hStats.done / hStats.total) * 100) : 0;
            var budPct = inc > 0 ? Math.min(100, Math.round((spend / inc) * 100)) : 0;

            h.push("<div class='card'><h3>Tableau de bord — " + MNAMES[State.activeDate.getMonth()] + "</h3>");
            h.push("<div class='grid-2'>");
            h.push("<div><span style='font-size:0.85em;color:var(--text-muted);font-weight:600;'>Habitudes régulières</span><div class='progress-bar'><div class='progress-fill' style='width:" + hPct + "%'></div></div><span class='mono' style='font-size:0.8em; margin-top:6px; display:block;'>" + hPct + "%</span></div>");
            h.push("<div><span style='font-size:0.85em;color:var(--text-muted);font-weight:600;'>Budget consommé</span><div class='progress-bar'><div class='progress-fill' style='width:" + budPct + "%;" + (budPct >= 100 ? "background:var(--danger);" : "") + "'></div></div><span class='mono' style='font-size:0.8em; margin-top:6px; display:block;'>" + budPct + "%</span></div>");
            h.push("</div></div>");

            h.push("<div class='grid-2'>");
            h.push("<div class='metric-tile text-center'><span style='font-size:0.85em;color:var(--text-muted);'>Revenus</span><h2 class='mono' style='color:var(--green); margin-top:8px;'>" + fmtNum(inc) + "</h2></div>");
            h.push("<div class='metric-tile text-center'><span style='font-size:0.85em;color:var(--text-muted);'>Dépenses</span><h2 class='mono' style='margin-top:8px;'>" + fmtNum(spend) + "</h2></div>");
            h.push("<div class='metric-tile text-center'><span style='font-size:0.85em;color:var(--text-muted);'>Solde</span><h2 class='mono' style='color:" + (inc - spend >= 0 ? 'var(--green)' : 'var(--danger)') + "; margin-top:8px;'>" + fmtNum(Math.abs(inc - spend)) + "</h2></div>");
            h.push("<div class='metric-tile text-center'><span style='font-size:0.85em;color:var(--text-muted);'>Dîme ✝️</span><h2 class='mono' style='color:var(--primary); margin-top:8px;'>" + fmtNum(dime) + "</h2></div>");
            h.push("</div>");

            function trancheBlock(title, rows, total, addFn) {
                h.push("<div class='tranche-body' style='margin-top:24px;'>");
                h.push("<div class='tranche-head' style='padding:0 0 16px 0; border:none; border-bottom:1px solid var(--border);'><span style='color:var(--text);'>" + title + "</span>" + (addFn ? "<button class='small outline' style='border:none;' onclick='" + addFn + "'>+ Ajouter</button>" : "") + "</div>");

            var sortedTasks = State.G.taches.map((t,i) => ({t:t, i:i})).sort((a,b) => {

            for (var i = 0; i < sortedTasks.length; i++) {

        /* ============ CONSEIL BUDGETAIRE — 100% ALGORITHMIQUE ============ */
        function calcEMA(values, alpha) {
            if (!values.length) return 0;
            var ema = values[0];
            for (var i = 1; i < values.length; i++) ema = alpha * values[i] + (1 - alpha) * ema;
            return ema;
        }
        function calcLinearTrend(values) {
            var n = values.length;
            if (n < 2) return 0;
            var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            for (var i = 0; i < n; i++) { sumX += i; sumY += values[i]; sumXY += i * values[i]; sumX2 += i * i; }
            var denom = n * sumX2 - sumX * sumX;
            return denom === 0 ? 0 : (n * sumXY - sumX * sumY) / denom;
        }
        function prevision(values, alpha) {
            if (!values.length) return 0;
            var ema = calcEMA(values, alpha);
            var trend = calcLinearTrend(values);
            var lastVal = values[values.length - 1];
            return Math.round(0.7 * ema + 0.3 * (lastVal + trend));
        }

        function getHistorique6Mois() {
            var mois = [];
            for (var i = 5; i >= 0; i--) {
                var d = new Date(State.activeDate.getFullYear(), State.activeDate.getMonth() - i, 1);
                var mk2 = getMonthKey(d);
                var dim = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                mois.push({
                    label: MSHORT[d.getMonth()] + ' ' + d.getFullYear(),
                    mk: mk2,
                    revenus: incomeTotalForMonth(mk2),
                    depenses: spentTotalForMonth(mk2),
                    courses: coursesSpentForMonth(mk2),
                    dim: dim
                });
            }
            return mois;
        }

        function analyserBudget() {
            ensureC(); ensureG();
            var histo = getHistorique6Mois();
            var revVals = histo.map(function(m){ return m.revenus; });
            var depVals = histo.map(function(m){ return m.depenses + m.courses; });
            var alpha = 0.5;

            var revMoyen = Math.round(revVals.reduce(function(a,b){ return a+b; }, 0) / (revVals.filter(function(v){ return v>0; }).length || 1));
            var depMoyenne = Math.round(depVals.reduce(function(a,b){ return a+b; }, 0) / (depVals.filter(function(v){ return v>0; }).length || 1));
            var tauxEpargne = revMoyen > 0 ? Math.round(((revMoyen - depMoyenne) / revMoyen) * 100) : 0;
            var trendDep = calcLinearTrend(depVals);
            var ratioBud = revMoyen > 0 ? Math.round((depMoyenne / revMoyen) * 100) : 0;

            var prevDep = [], prevRev = [];
            for (var pi = 1; pi <= 3; pi++) {
                var allDepSoFar = depVals.concat();
                prevDep.push(prevision(allDepSoFar, alpha));
                prevRev.push(prevision(revVals, alpha));
            }
            var prevMonth = new Date(State.activeDate.getFullYear(), State.activeDate.getMonth() + 1, 1);
            var prevLabels = [];
            for (var pl = 0; pl < 3; pl++) {
                var pm = new Date(prevMonth.getFullYear(), prevMonth.getMonth() + pl, 1);
                prevLabels.push(MSHORT[pm.getMonth()] + ' ' + pm.getFullYear());
            }

            var ratioPrev = prevRev[0] > 0 ? (prevDep[0] / prevRev[0]) : 1;
            var risque = ratioPrev < 0.7 ? 'Faible' : ratioPrev < 0.9 ? 'Moyen' : 'Élevé';
            var risqueStatut = ratioPrev < 0.7 ? 'ok' : ratioPrev < 0.9 ? 'warn' : 'crit';
            var tendanceLbl = trendDep > 2000 ? 'hausse' : trendDep < -2000 ? 'baisse' : 'stable';
            var tendanceStatut = trendDep > 5000 ? 'crit' : trendDep > 2000 ? 'warn' : 'ok';
            var epStatut = tauxEpargne >= 20 ? 'ok' : tauxEpargne >= 10 ? 'warn' : 'crit';
            var revStatut = revMoyen >= 1000000 ? 'ok' : revMoyen >= 500000 ? 'warn' : 'crit';

            var dk = todayDateKey();
            var evUrgents = State.G.events.filter(function(e){ return e.date >= dk; }).slice(0, 3);
            var objEnCours = State.G.objectifs.filter(function(o){ return o.current < o.target; });

            var reco = [];
            if (tauxEpargne < 20) reco.push("💡 Augmentez votre taux d'épargne : visez " + Math.max(State.C.savings, Math.round(revMoyen * 0.2)) + " Ar/mois (20% des revenus).");
            if (trendDep > 2000) reco.push("⚡ Vos dépenses augmentent de " + fmtNum(Math.round(trendDep)) + " Ar/mois. Identifiez les postes variables à réduire.");
            if (ratioBud > 90) reco.push("🔴 Ratio dépenses/revenus critique (" + ratioBud + "%). Réduire immédiatement les dépenses non-essentielles.");
            else if (ratioBud > 75) reco.push("🟡 Ratio dépenses/revenus (" + ratioBud + "%). Attention, la marge est serrée.");
            if (evUrgents.length) reco.push("📅 " + evUrgents.length + " événement(s) à venir — prévoyez une réserve supplémentaire.");
            if (objEnCours.length) {
                var totalManque = objEnCours.reduce(function(s, o){ return s + Math.max(0, o.target - o.current); }, 0);
                reco.push("🎯 " + objEnCours.length + " objectif(s) actif(s). Il vous faut encore " + fmtNum(totalManque) + " " + (objEnCours[0].unit || 'Ar') + " pour les atteindre.");
            }
            if (!reco.length) reco.push("✅ Vos finances sont saines. Continuez sur cette lancée !");

            var vigilance = [];
            var lastMois = histo[histo.length - 1];
            if (lastMois.depenses > State.C.dayBudget * lastMois.dim * 1.1)
                vigilance.push("Les dépenses quotidiennes de " + MSHORT[State.activeDate.getMonth()] + " dépassent le budget de " + Math.round(((lastMois.depenses / (State.C.dayBudget * lastMois.dim)) - 1) * 100) + "%.");
            if (lastMois.courses > State.C.coursesMo * 1.1)
                vigilance.push("Le budget courses a été dépassé de " + fmtNum(lastMois.courses - State.C.coursesMo) + " Ar ce mois.");
            var dimeActuelle = dimeForMonth(getMonthKey(State.activeDate));
            if (dimeActuelle > 0)
                vigilance.push("Dîme du mois : " + fmtNum(dimeActuelle) + " Ar — avez-vous mis de côté cette somme ?");
            if (!vigilance.length) vigilance.push("Aucun dépassement majeur détecté ce mois.");

            var soldePrevu = prevRev[0] - prevDep[0] - State.C.savings - dimeForMonth(getMonthKey(State.activeDate));
            var stra = "Sur les 3 prochains mois, votre épargne nette estimée est de " + fmtNum(Math.max(0, soldePrevu * 3)) + " Ar. ";
            stra += tauxEpargne >= 20
                ? "Votre discipline d'épargne est excellente. Envisagez d'investir l'excédent plutôt que de le laisser dormir."
                : "Automatisez votre épargne dès réception du salaire — un virement immédiat de " + fmtNum(Math.round(revMoyen * 0.2)) + " Ar évite les dépenses impulsives.";

            var result = {
                ts: Date.now(),
                metriques: {
                    'Revenu moyen':      { valeur: fmtNum(revMoyen) + ' Ar', statut: revStatut, sous: 'Moyenne des 6 derniers mois' },
                    'Taux épargne':      { valeur: tauxEpargne + ' %', statut: epStatut, sous: tauxEpargne >= 20 ? 'Objectif atteint ✓' : 'Cible : 20%' },
                    'Tendance dépenses': { valeur: tendanceLbl, statut: tendanceStatut, sous: (trendDep >= 0 ? '+' : '') + fmtNum(Math.round(trendDep)) + ' Ar/mois' },
                    'Risque mois prochain': { valeur: risque, statut: risqueStatut, sous: 'Ratio prévu : ' + Math.round(ratioPrev * 100) + '%' }
                },
                previsions: prevLabels.map(function(lbl, i){ return { lbl: lbl, dep: prevDep[i], rev: prevRev[i] }; }),
                recommandations: reco,
                vigilance: vigilance,
                strategie: stra
            };

            State.G.lastAnalyse = result;
            triggerSave();
            nav('mois');
        }

        function renderAnalyseContent(data) {
            var statusColor = { ok: 'var(--green)', warn: 'var(--gold)', crit: 'var(--danger)' };
            var out = [];

            out.push("<div class='grid-2' style='margin-bottom:24px;'>");
            for (var key in data.metriques) {
                var m = data.metriques[key];
                var col = statusColor[m.statut] || 'var(--text)';
                out.push("<div class='metric-tile'><span style='font-size:0.85em;color:var(--text-muted); font-weight:600;'>" + escHtml(key) + "</span><h3 class='mono' style='color:" + col + ";margin:8px 0;font-size:1.3rem;'>" + escHtml(m.valeur) + "</h3><span style='font-size:0.8em;color:var(--text-muted);'>" + escHtml(m.sous || '') + "</span></div>");
            }
            out.push("</div>");

            if (data.previsions && data.previsions.length) {
                out.push("<div class='analyse-section'><h4>🔮 Modélisation sur 3 mois</h4>");
                out.push("<div class='grid-2' style='gap:12px;'>");
                for (var pi = 0; pi < data.previsions.length; pi++) {
                    var pv = data.previsions[pi];
                    var solde = pv.rev - pv.dep;
                    out.push("<div class='metric-tile'><span style='font-size:0.85em;color:var(--text-muted); font-weight:600;'>" + escHtml(pv.lbl) + "</span><div class='mono' style='font-size:0.9em;margin-top:8px;'><span style='color:var(--green);'>↑ " + fmtNum(pv.rev) + " Ar</span><br><span style='color:var(--danger);'>↓ " + fmtNum(pv.dep) + " Ar</span><br><span style='color:" + (solde >= 0 ? 'var(--green)' : 'var(--danger)') + ";font-weight:bold; margin-top:6px; display:block;'>= " + fmtNum(solde) + " Ar</span></div></div>");
                }
                out.push("</div></div>");
            }

            if (data.vigilance && data.vigilance.length) {
                out.push("<div class='analyse-section' style='margin-top:24px;'><h4>⚠️ Alertes</h4>");
                for (var vi = 0; vi < data.vigilance.length; vi++)
                    out.push("<p style='padding:8px 0; border-bottom:1px solid var(--bg);'>• " + escHtml(data.vigilance[vi]) + "</p>");
                out.push("</div>");
            }

            if (data.recommandations && data.recommandations.length) {
                out.push("<div class='analyse-section' style='margin-top:24px;'><h4>✅ Plan d'action</h4>");
                for (var ri = 0; ri < data.recommandations.length; ri++)
                    out.push("<p style='padding:8px 0; border-bottom:1px solid var(--bg);'>" + escHtml(data.recommandations[ri]) + "</p>");
                out.push("</div>");
            }

            if (data.strategie) {
                out.push("<div class='analyse-section' style='margin-top:24px; padding:16px; background:var(--bg); border-radius:12px;'><h4>🎯 Stratégie long terme</h4><p>" + escHtml(data.strategie) + "</p></div>");
            }

            return out.join("");
        }

        function resetAllData() {
            if (!confirm('Êtes-vous certain de vouloir effacer toutes les données ?')) return;
            State.D = {};
            State.G = JSON.parse(JSON.stringify(defaultG));
            triggerSave();
            nav('jour');
            toast('Système réinitialisé');
        }
    </script>
</body>
</html>
