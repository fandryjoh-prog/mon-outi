<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MonOutil — Budget & Tâches</title>
<style>
:root{
  --ff-s:Georgia,"Times New Roman",serif;
  --ff:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --ff-m:ui-monospace,"SF Mono",Consolas,"Courier New",monospace;
}
[data-theme=light]{--bg:#F9F8F6;--bg2:#EEE8E0;--card:#fff;--text:#1E1E1E;--t2:#777;--t3:#bbb;--bdr:rgba(43,43,43,.1);--gold:#C5A880;--goldbg:#EDE0CC;--sage:#8C9485;--sagebg:#DCE0DA;--top:#1E1E1E;--toptxt:#F9F8F6;--inp:#fff;--pb:rgba(197,168,128,.15);--G:#5D9970;--Gbg:rgba(93,153,112,.12);--R:#BE6050;--Rbg:rgba(190,96,80,.1);--B:#5D7FA8;--Bbg:rgba(93,127,168,.12);--P:#8B6FA8;--Pbg:rgba(139,111,168,.12);--savbg:#1E1E1E;--savtxt:#F9F8F6;--ta:#C5A880;--tat:#1E1E1E}
[data-theme=dark]{--bg:#141412;--bg2:#1C1C1A;--card:#222220;--text:#EAE6DE;--t2:#7A7A72;--t3:#444;--bdr:rgba(197,168,128,.12);--gold:#C5A880;--goldbg:rgba(197,168,128,.16);--sage:#8C9485;--sagebg:rgba(140,148,133,.15);--top:#0A0A09;--toptxt:#EAE6DE;--inp:#1C1C1A;--pb:rgba(197,168,128,.1);--G:#6DAA80;--Gbg:rgba(109,170,128,.12);--R:#CC7060;--Rbg:rgba(204,112,96,.1);--B:#7090B8;--Bbg:rgba(112,144,184,.12);--P:#9A7FBA;--Pbg:rgba(154,127,186,.12);--savbg:#0A0A09;--savtxt:#EAE6DE;--ta:#C5A880;--tat:#141412}
[data-theme=neon]{--bg:#060608;--bg2:#0E0E12;--card:#111116;--text:#FEE440;--t2:#00BBF9;--t3:#444;--bdr:rgba(254,228,64,.15);--gold:#FEE440;--goldbg:rgba(254,228,64,.1);--sage:#00BBF9;--sagebg:rgba(0,187,249,.1);--top:#000;--toptxt:#FEE440;--inp:#0A0A10;--pb:rgba(254,228,64,.08);--G:#00F5D4;--Gbg:rgba(0,245,212,.1);--R:#F15BB5;--Rbg:rgba(241,91,181,.1);--B:#00BBF9;--Bbg:rgba(0,187,249,.1);--P:#F15BB5;--Pbg:rgba(241,91,181,.1);--savbg:#000;--savtxt:#FEE440;--ta:#FEE440;--tat:#000}
[data-theme=solar]{--bg:#2E1340;--bg2:#3D1B54;--card:#4A2265;--text:#FFF275;--t2:#C9A8E0;--t3:#7A5A90;--bdr:rgba(255,242,117,.15);--gold:#FFC839;--goldbg:rgba(255,200,57,.15);--sage:#C9A8E0;--sagebg:rgba(201,168,224,.15);--top:#200D30;--toptxt:#FFF275;--inp:#3D1B54;--pb:rgba(255,242,117,.08);--G:#FFF275;--Gbg:rgba(255,242,117,.12);--R:#FF8C42;--Rbg:rgba(255,140,66,.12);--B:#C9A8E0;--Bbg:rgba(201,168,224,.12);--P:#FF8C42;--Pbg:rgba(255,140,66,.1);--savbg:#200D30;--savtxt:#FFF275;--ta:#FFC839;--tat:#2E1340}
[data-theme=warm]{--bg:#FFF8F0;--bg2:#FFEFE0;--card:#fff;--text:#2B1200;--t2:#9A5020;--t3:#DDA060;--bdr:rgba(224,60,38,.14);--gold:#FED136;--goldbg:rgba(254,209,54,.2);--sage:#EA6D25;--sagebg:rgba(234,109,37,.12);--top:#C02010;--toptxt:#fff;--inp:#FFF8F0;--pb:rgba(234,109,37,.1);--G:#2B8C50;--Gbg:rgba(43,140,80,.12);--R:#E03C26;--Rbg:rgba(224,60,38,.1);--B:#EA6D25;--Bbg:rgba(234,109,37,.12);--P:#8B4A20;--Pbg:rgba(139,74,32,.1);--savbg:#2B1200;--savtxt:#FED136;--ta:#FED136;--tat:#2B1200}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{background:var(--top);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:400;gap:8px}
.logo{font-family:var(--ff-s);font-size:1rem;color:var(--toptxt);line-height:1.1;white-space:nowrap}
.logo em{color:var(--gold);font-style:normal}
.logo small{display:block;font-size:.5rem;color:var(--sage);font-family:var(--ff);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.ibtn{background:none;border:1.5px solid rgba(197,168,128,.5);color:var(--gold);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:.72rem;font-weight:600;transition:.12s}
.ibtn:active{background:var(--gold);color:var(--top)}
.topbar-right{display:flex;gap:6px;align-items:center}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--top);border-top:1.5px solid rgba(197,168,128,.25);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;border:none;background:transparent;color:rgba(197,168,128,.4);cursor:pointer;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.48rem;font-family:var(--ff);font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:.15s;position:relative}
.nb .ni{font-size:1.1rem;transition:.15s;display:block}
.nb.act{color:var(--gold)}
.nb.act .ni{transform:translateY(-2px)}
.nb.act::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 3px 3px}

/* WRAP */
.wrap{padding-bottom:calc(58px + env(safe-area-inset-bottom,0))}
.page{display:none;padding:14px 13px 20px;animation:fadeUp .18s ease both;max-width:900px;margin:0 auto}
.page.act{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* PAGE HEADER */
.ph{margin-bottom:14px;padding-bottom:9px;border-bottom:1.5px solid var(--bdr)}
.ph-row{display:flex;align-items:baseline;justify-content:space-between}
.ph-title{font-family:var(--ff-s);font-size:1.2rem}
.ph-title em{color:var(--gold);font-style:normal}
.ph-sub{font-family:var(--ff-m);font-size:.65rem;color:var(--t2)}

/* KPI */
.krow{display:grid;gap:7px;margin-bottom:12px}
.k2{grid-template-columns:1fr 1fr}
.k3{grid-template-columns:1fr 1fr 1fr}
.k4{grid-template-columns:1fr 1fr;row-gap:7px}
@media(min-width:460px){.k4{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--card);border-radius:11px;padding:10px 8px;border:1px solid var(--bdr);text-align:center;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--gold);opacity:.5}
.kpi.kg::before{background:var(--G)}.kpi.kr::before{background:var(--R)}.kpi.kb::before{background:var(--B)}.kpi.kp::before{background:var(--P)}
.kv{font-family:var(--ff-m);font-size:.88rem;font-weight:700;color:var(--text);line-height:1.2}
.kv.ok{color:var(--G)}.kv.bad{color:var(--R)}.kv.gld{color:var(--gold)}
.kk{font-size:.56rem;color:var(--t2);margin-top:3px;font-weight:500}

/* PROGRESS */
.pw{margin-bottom:9px}
.pm{display:flex;justify-content:space-between;font-size:.62rem;color:var(--t2);margin-bottom:3px;font-weight:500}
.pt{background:var(--pb);border-radius:20px;height:5px;overflow:hidden}
.pf{height:100%;border-radius:20px;transition:width .5s}
.pf-g{background:linear-gradient(90deg,var(--gold),#D4BC99)}
.pf-G{background:linear-gradient(90deg,var(--G),#8BC9A0)}
.pf-R{background:linear-gradient(90deg,var(--R),#D98070)}
.pf-B{background:linear-gradient(90deg,var(--B),#90AAC8)}
.pf-P{background:linear-gradient(90deg,var(--P),#B09AC8)}

/* CARDS */
.card{background:var(--card);border-radius:13px;padding:14px 15px;border:1px solid var(--bdr);margin-bottom:11px}
.card.l-g{border-left:3px solid var(--gold)}
.card.l-G{border-left:3px solid var(--G)}
.card.l-B{border-left:3px solid var(--B)}
.card.l-P{border-left:3px solid var(--P)}
.card.l-R{border-left:3px solid var(--R)}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ctitle{font-family:var(--ff-s);font-size:.86rem;display:flex;align-items:center;gap:6px}
.ci{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.76rem;flex-shrink:0}
.ci-g{background:var(--goldbg)}.ci-G{background:var(--Gbg)}.ci-B{background:var(--Bbg)}.ci-P{background:var(--Pbg)}.ci-R{background:var(--Rbg)}.ci-d{background:var(--top);color:var(--toptxt)}

/* MINI LABEL */
.ml{font-size:.57rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);margin:8px 0 5px;display:flex;align-items:center;justify-content:space-between}

/* STAT ROW */
.sr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:.76rem;color:var(--text)}
.sr:last-child{border-bottom:none}
.sv{font-family:var(--ff-m);font-weight:600;font-size:.74rem}
.sv.ok{color:var(--G)}.sv.bad{color:var(--R)}.sv.gld{color:var(--gold)}

/* TASKS */
.titem{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--bdr);transition:.1s}
.titem:last-child{border-bottom:none}
.tchk{width:21px;height:21px;border-radius:50%;border:2px solid var(--B);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:transparent;transition:.12s;flex-shrink:0;margin-top:1px;user-select:none}
.tchk.on{background:var(--B);color:#fff;border-color:var(--B)}
.tchk.prio{border-color:var(--R)}
.tchk.prio.on{background:var(--R);border-color:var(--R)}
.tbody{flex:1;min-width:0}
.tname{font-size:.8rem;font-weight:500;line-height:1.3}
.tname.dn{text-decoration:line-through;color:var(--t2)}
.tmeta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center}
.ttag{font-size:.56rem;padding:2px 7px;border-radius:4px;font-weight:700}
.tw{background:var(--goldbg);color:#7a5a20}
.tp{background:var(--Gbg);color:var(--G)}
.tu{background:var(--Rbg);color:var(--R)}
.tb{background:var(--Bbg);color:var(--B)}
.tdue{font-size:.6rem;color:var(--t3);font-family:var(--ff-m)}
.tdue.late{color:var(--R)}
.tadd{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tadd input,.tadd select{border:1.5px solid var(--bdr);border-radius:8px;padding:8px 9px;font-size:.76rem;color:var(--text);background:var(--inp);font-family:var(--ff)}
.tadd input{flex:1;min-width:120px}
.tadd input:focus,.tadd select:focus{outline:none;border-color:var(--B)}
.tadd-row2{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tadd-row2 input[type=date]{flex:1;min-width:110px}

/* TBOX / TOTALS */
.tbox{border-radius:8px;padding:9px 12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.tb-g{background:var(--goldbg)}.tb-G{background:var(--Gbg)}.tb-B{background:var(--Bbg)}.tb-R{background:var(--Rbg)}.tb-d{background:var(--savbg)}
.tbl{font-weight:600;font-size:.76rem;color:var(--text)}.tb-d .tbl{color:var(--savtxt)}
.tbv{font-family:var(--ff-m);font-weight:700;font-size:.82rem;color:var(--text)}.tb-d .tbv{color:var(--gold)}
.rbox{border-radius:7px;padding:7px 12px;margin-top:4px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem}
.rok{background:var(--Gbg)}.rbad{background:var(--Rbg)}
.vok{font-family:var(--ff-m);font-weight:700;color:var(--G)}
.vbad{font-family:var(--ff-m);font-weight:700;color:var(--R)}

/* BUDGET LINE */
.bl{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:.77rem;gap:6px}
.bl:last-child{border-bottom:none}
.bll{flex:1;color:var(--text)}
.bla{font-family:var(--ff-m);font-size:.7rem;color:var(--t2);white-space:nowrap}
.bedit{font-family:var(--ff-m);font-size:.74rem;border:1.5px solid var(--bdr);border-radius:7px;padding:5px 8px;width:110px;text-align:right;color:var(--text);background:var(--inp);-webkit-appearance:none}
.bedit:focus{outline:none;border-color:var(--P);box-shadow:0 0 0 3px rgba(139,111,168,.12)}
.bcat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FREE ROW */
.freerow{display:flex;gap:5px;align-items:center;padding:3px 0}
.freerow .ftxt{flex:1;border:1.5px solid var(--bdr);border-radius:7px;padding:6px 8px;font-size:.72rem;font-family:var(--ff);color:var(--text);background:var(--inp)}
.freerow .ftxt:focus{outline:none;border-color:var(--gold)}
.freerow .fnum{font-family:var(--ff-m);font-size:.72rem;border:1.5px solid var(--bdr);border-radius:7px;padding:6px 7px;width:100px;text-align:right;color:var(--text);background:var(--inp);-webkit-appearance:none}
.freerow .fnum:focus{outline:none;border-color:var(--gold)}

/* INPUTS */
.inrow{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.inrow input,.inrow select{border:1.5px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:.78rem;font-family:var(--ff);color:var(--text);background:var(--inp);-webkit-appearance:none;flex:1;min-width:100px}
.inrow input:focus,.inrow select:focus{outline:none;border-color:var(--gold)}
.txtin{border:1.5px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:.78rem;font-family:var(--ff);color:var(--text);background:var(--inp);width:100%;resize:vertical;min-height:52px;line-height:1.5}
.txtin:focus{outline:none;border-color:var(--gold)}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:8px;font-size:.73rem;font-family:var(--ff);font-weight:600;cursor:pointer;border:none;transition:.12s;display:inline-flex;align-items:center;gap:4px}
.btng{background:var(--gold);color:var(--tat)}.btng:active{filter:brightness(.9)}
.btno{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}.btno:active{background:var(--goldbg)}
.btnb{background:transparent;border:1.5px solid var(--B);color:var(--B)}.btnb:active{background:var(--Bbg)}
.btnr{background:transparent;border:1.5px solid var(--R);color:var(--R)}.btnr:active{background:var(--Rbg)}
.btnG{background:transparent;border:1.5px solid var(--G);color:var(--G)}.btnG:active{background:var(--Gbg)}
.btnxs{padding:3px 8px;font-size:.62rem;border-radius:5px}
.btnfull{width:100%;justify-content:center;padding:10px}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px)}
.moverlay.open{display:flex}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:18px 16px;padding-bottom:calc(18px + env(safe-area-inset-bottom,0));width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border-top:2px solid var(--gold)}
@media(min-width:680px){.moverlay{align-items:center}.modal{border-radius:16px;max-height:87vh}}
.mdrag{width:34px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 15px}
.mhd{font-family:var(--ff-s);font-size:1rem;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mclose{background:none;border:none;font-size:1.15rem;cursor:pointer;color:var(--t2);padding:3px 7px;border-radius:6px}
.msec{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--bdr)}
.msec:last-of-type{border-bottom:none;margin-bottom:0}
.msec h3{font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:9px}
.sf label{display:block;font-size:.66rem;color:var(--t2);margin-bottom:3px;font-weight:600}
.sf input,.sf select{width:100%;border:1.5px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:.78rem;font-family:var(--ff);color:var(--text);background:var(--inp);-webkit-appearance:none;margin-bottom:8px}
.sf input:focus,.sf select:focus{outline:none;border-color:var(--gold)}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
@media(min-width:420px){.tgrid{grid-template-columns:repeat(5,1fr)}}
.tcard{border-radius:9px;padding:9px 6px;cursor:pointer;border:2px solid transparent;text-align:center;background:var(--bg2);transition:.12s}
.tcard.sel{border-color:var(--gold)}
.tcp{display:flex;gap:3px;justify-content:center;margin-bottom:5px}
.td{width:11px;height:11px;border-radius:50%}
.tcn{color:var(--text);font-size:.6rem;font-weight:500}

/* SAVINGS DARK */
.savblk{background:var(--savbg);border-radius:13px;padding:15px;margin-bottom:11px}
.savblk h4{font-family:var(--ff-s);font-size:.88rem;color:var(--gold);margin-bottom:10px}
.savg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(min-width:460px){.savg{grid-template-columns:repeat(4,1fr)}}
.sgi{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 6px;text-align:center}
.sgv{font-family:var(--ff-m);font-size:.88rem;font-weight:700;color:var(--gold)}
.sgk{font-size:.56rem;color:var(--sage);margin-top:2px}

/* DÉPENSE ITEM */
.dep-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:.76rem}
.dep-item:last-child{border-bottom:none}
.dep-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.dep-body{flex:1;min-width:0}
.dep-name{font-weight:500;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-cat{font-size:.6rem;color:var(--t2);margin-top:1px}
.dep-amt{font-family:var(--ff-m);font-weight:700;font-size:.78rem;white-space:nowrap;flex-shrink:0}
.dep-amt.neg{color:var(--R)}
.dep-amt.pos{color:var(--G)}

/* SECTION TABS */
.stabs{display:flex;gap:3px;background:rgba(197,168,128,.1);border-radius:9px;padding:3px;margin-bottom:12px}
.stab{flex:1;padding:6px 0;border:none;border-radius:7px;cursor:pointer;font-size:.68rem;font-weight:600;font-family:var(--ff);background:transparent;color:var(--sage);transition:.14s}
.stab.act{background:var(--ta);color:var(--tat)}

/* CAT BADGE */
.cat-pill{display:inline-flex;align-items:center;gap:3px;font-size:.58rem;padding:2px 7px;border-radius:12px;font-weight:700}

/* CHART BAR */
.chart-bar-wrap{display:flex;align-items:center;gap:7px;padding:4px 0}
.chart-bar-lbl{font-size:.65rem;color:var(--t2);width:70px;flex-shrink:0;text-align:right}
.chart-bar-track{flex:1;height:8px;background:var(--pb);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.chart-bar-val{font-family:var(--ff-m);font-size:.6rem;color:var(--t2);width:60px;text-align:left}

/* TOAST */
.toast{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom,0) + 8px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--top);color:var(--toptxt);padding:8px 16px;border-radius:18px;border:1px solid var(--gold);font-size:.72rem;opacity:0;transition:.22s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY STATE */
.empty{text-align:center;padding:30px 16px;color:var(--t2)}
.empty .eico{font-size:2.2rem;margin-bottom:8px}
.empty p{font-size:.78rem}

/* FILTER ROW */
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fpill{font-size:.64rem;padding:4px 10px;border-radius:12px;border:1.5px solid var(--bdr);cursor:pointer;font-weight:600;font-family:var(--ff);background:transparent;color:var(--t2);transition:.12s}
.fpill.act{background:var(--gold);color:var(--tat);border-color:var(--gold)}

/* PRIORITY DOT */
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.pdot-R{background:var(--R)}.pdot-g{background:var(--gold)}.pdot-G{background:var(--G)}

@media(min-width:768px){
  .bnav{display:none}
  .wrap{padding-bottom:0}
  .page{padding:20px 24px 28px}
}
</style>
</head>
<body>

<!-- SETTINGS MODAL -->
<div class="moverlay" id="settModal">
<div class="modal">
  <div class="mdrag"></div>
  <div class="mhd"><span>⚙️ Paramètres</span><button class="mclose" onclick="closeS()">✕</button></div>
  <div class="msec"><h3>🎨 Thème</h3>
    <div class="tgrid">
      <div class="tcard" data-th="light" onclick="setTheme('light')"><div class="tcp"><div class="td" style="background:#F9F8F6;border:1px solid #ccc"></div><div class="td" style="background:#C5A880"></div><div class="td" style="background:#8C9485"></div></div><div class="tcn">☀️ Jour</div></div>
      <div class="tcard" data-th="dark" onclick="setTheme('dark')"><div class="tcp"><div class="td" style="background:#141412"></div><div class="td" style="background:#C5A880"></div><div class="td" style="background:#8C9485"></div></div><div class="tcn">🌙 Nuit</div></div>
      <div class="tcard" data-th="neon" onclick="setTheme('neon')"><div class="tcp"><div class="td" style="background:#000"></div><div class="td" style="background:#FEE440"></div><div class="td" style="background:#00BBF9"></div></div><div class="tcn">⚡ Neon</div></div>
      <div class="tcard" data-th="solar" onclick="setTheme('solar')"><div class="tcp"><div class="td" style="background:#2E1340"></div><div class="td" style="background:#FFC839"></div><div class="td" style="background:#FFF275"></div></div><div class="tcn">🌅 Solar</div></div>
      <div class="tcard" data-th="warm" onclick="setTheme('warm')"><div class="tcp"><div class="td" style="background:#C02010"></div><div class="td" style="background:#FED136"></div><div class="td" style="background:#EA6D25"></div></div><div class="tcn">🔥 Warm</div></div>
    </div>
  </div>
  <div class="msec"><h3>💵 Revenus & Budget</h3>
    <div class="sg2">
      <div class="sf"><label>Revenu mensuel (Ar)</label><input type="number" id="st_rev" placeholder="ex: 2000000"/></div>
      <div class="sf"><label>Épargne objectif (Ar)</label><input type="number" id="st_sav" placeholder="ex: 500000"/></div>
      <div class="sf"><label>Nom / Prénom</label><input type="text" id="st_nom" placeholder="Mon Outil"/></div>
      <div class="sf"><label>Devise</label><select id="st_cur"><option value="Ar">Ariary (Ar)</option><option value="€">Euro (€)</option><option value="$">Dollar ($)</option></select></div>
    </div>
  </div>
  <div class="msec"><h3>🗑 Données</h3>
    <button class="btn btnr" onclick="resetAll()">🗑 Tout effacer</button>
  </div>
  <button class="btn btng btnfull" onclick="saveS()">✓ Enregistrer</button>
</div>
</div>

<!-- ADD DÉPENSE MODAL -->
<div class="moverlay" id="depModal">
<div class="modal">
  <div class="mdrag"></div>
  <div class="mhd"><span id="dep-modal-title">➕ Nouvelle transaction</span><button class="mclose" onclick="closeDep()">✕</button></div>
  <div class="sf"><label>Type</label>
    <select id="dep-type" onchange="updDepType()">
      <option value="dep">💸 Dépense</option>
      <option value="rev">💰 Revenu</option>
    </select>
  </div>
  <div class="sf"><label>Description</label><input type="text" id="dep-name" placeholder="ex: Courses alimentaires"/></div>
  <div class="sg2">
    <div class="sf"><label>Montant (Ar)</label><input type="number" id="dep-amt" placeholder="0"/></div>
    <div class="sf"><label>Date</label><input type="date" id="dep-date"/></div>
  </div>
  <div class="sf"><label>Catégorie</label>
    <select id="dep-cat">
      <option value="🍽 Alimentation">🍽 Alimentation</option>
      <option value="🏠 Logement">🏠 Logement</option>
      <option value="🚗 Transport">🚗 Transport</option>
      <option value="💆 Santé / Bien-être">💆 Santé / Bien-être</option>
      <option value="🎉 Loisirs">🎉 Loisirs</option>
      <option value="👔 Vêtements">👔 Vêtements</option>
      <option value="📱 Abonnements">📱 Abonnements</option>
      <option value="💼 Travail">💼 Travail</option>
      <option value="🎓 Éducation">🎓 Éducation</option>
      <option value="💡 Factures">💡 Factures</option>
      <option value="🎁 Cadeaux">🎁 Cadeaux</option>
      <option value="💰 Salaire">💰 Salaire</option>
      <option value="📈 Investissement">📈 Investissement</option>
      <option value="🔧 Divers">🔧 Divers</option>
    </select>
  </div>
  <div class="sf"><label>Note (optionnel)</label><textarea class="txtin" id="dep-note" placeholder="Commentaire…" style="min-height:42px"></textarea></div>
  <button class="btn btng btnfull" onclick="saveDep()" style="margin-top:6px">✓ Ajouter</button>
</div>
</div>

<!-- ADD TÂCHE MODAL -->
<div class="moverlay" id="taskModal">
<div class="modal">
  <div class="mdrag"></div>
  <div class="mhd"><span>➕ Nouvelle tâche</span><button class="mclose" onclick="closeTask()">✕</button></div>
  <div class="sf"><label>Titre de la tâche</label><input type="text" id="task-name" placeholder="ex: Préparer rapport mensuel"/></div>
  <div class="sg2">
    <div class="sf"><label>Catégorie</label>
      <select id="task-cat">
        <option value="💼 Travail">💼 Travail</option>
        <option value="🌿 Perso">🌿 Perso</option>
        <option value="🏠 Maison">🏠 Maison</option>
        <option value="💪 Santé">💪 Santé</option>
        <option value="📚 Éducation">📚 Éducation</option>
        <option value="💰 Finance">💰 Finance</option>
        <option value="🔧 Divers">🔧 Divers</option>
      </select>
    </div>
    <div class="sf"><label>Priorité</label>
      <select id="task-prio">
        <option value="haute">🔴 Haute</option>
        <option value="moyenne" selected>🟡 Moyenne</option>
        <option value="basse">🟢 Basse</option>
      </select>
    </div>
  </div>
  <div class="sg2">
    <div class="sf"><label>Échéance</label><input type="date" id="task-due"/></div>
    <div class="sf"><label>Projet</label><input type="text" id="task-proj" placeholder="ex: Personnel"/></div>
  </div>
  <div class="sf"><label>Description</label><textarea class="txtin" id="task-desc" placeholder="Détails…" style="min-height:42px"></textarea></div>
  <button class="btn btng btnfull" onclick="saveTask()" style="margin-top:6px">✓ Ajouter la tâche</button>
</div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">Mon<em>Outil</em><small id="logo-sub">Budget & Tâches</small></div>
  <div class="topbar-right">
    <button class="ibtn" onclick="openS()">⚙️</button>
  </div>
</header>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nb act" onclick="goPage('dashboard',this)"><span class="ni">📊</span>Dashboard</button>
  <button class="nb" onclick="goPage('budget',this)"><span class="ni">💰</span>Budget</button>
  <button class="nb" onclick="goPage('taches',this)"><span class="ni">✅</span>Tâches</button>
  <button class="nb" onclick="goPage('stats',this)"><span class="ni">📈</span>Stats</button>
</nav>

<div class="wrap">

<!-- ══ PAGE DASHBOARD ══ -->
<div class="page act" id="pg-dashboard">
  <div class="ph">
    <div class="ph-row">
      <div class="ph-title"><em>Dashboard</em></div>
      <div class="ph-sub" id="dash-date"></div>
    </div>
  </div>
  <div id="dash-content"></div>
</div>

<!-- ══ PAGE BUDGET ══ -->
<div class="page" id="pg-budget">
  <div class="ph">
    <div class="ph-row">
      <div class="ph-title">💰 <em>Budget</em></div>
      <button class="btn btng btnxs" onclick="openDep()">+ Transaction</button>
    </div>
  </div>
  <div class="stabs">
    <button class="stab act" onclick="setBudTab('liste',this)">📋 Liste</button>
    <button class="stab" onclick="setBudTab('categories',this)">🏷 Catégories</button>
    <button class="stab" onclick="setBudTab('mensuel',this)">🗓 Mensuel</button>
  </div>
  <div id="budget-content"></div>
</div>

<!-- ══ PAGE TÂCHES ══ -->
<div class="page" id="pg-taches">
  <div class="ph">
    <div class="ph-row">
      <div class="ph-title">✅ <em>Tâches</em></div>
      <button class="btn btng btnxs" onclick="openTask()">+ Tâche</button>
    </div>
  </div>
  <div class="stabs">
    <button class="stab act" onclick="setTaskTab('toutes',this)">Toutes</button>
    <button class="stab" onclick="setTaskTab('encours',this)">En cours</button>
    <button class="stab" onclick="setTaskTab('terminees',this)">Terminées</button>
  </div>
  <div id="task-filter-row" class="frow"></div>
  <div id="taches-content"></div>
</div>

<!-- ══ PAGE STATS ══ -->
<div class="page" id="pg-stats">
  <div class="ph">
    <div class="ph-row">
      <div class="ph-title">📈 <em>Statistiques</em></div>
      <div class="ph-sub" id="stats-period"></div>
    </div>
  </div>
  <div id="stats-content"></div>
</div>

</div><!-- /wrap -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════
let CFG = JSON.parse(localStorage.getItem('mo_cfg') || '{"rev":0,"sav":0,"nom":"Mon Outil","cur":"Ar","theme":"light"}');
let DEPS = JSON.parse(localStorage.getItem('mo_deps') || '[]');
let TASKS = JSON.parse(localStorage.getItem('mo_tasks') || '[]');
let CURTH = CFG.theme || 'light';
let BUD_TAB = 'liste';
let TASK_TAB = 'toutes';
let TASK_CAT_FILTER = 'Toutes';

const MN = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MNL = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DN = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const CAT_COLORS = {
  '🍽 Alimentation':'#E07840','🏠 Logement':'#5D7FA8','🚗 Transport':'#8C9485',
  '💆 Santé / Bien-être':'#5D9970','🎉 Loisirs':'#C5A880','👔 Vêtements':'#9B59B6',
  '📱 Abonnements':'#00BBF9','💼 Travail':'#1E1E1E','🎓 Éducation':'#F39C12',
  '💡 Factures':'#BE6050','🎁 Cadeaux':'#F15BB5','💰 Salaire':'#5D9970',
  '📈 Investissement':'#2ECC71','🔧 Divers':'#95A5A6'
};

function fmt(n){return Math.abs(Math.round(n)).toLocaleString('fr-FR')}
function cur(){return CFG.cur||'Ar'}
function fmtC(n){return fmt(n)+' '+cur()}
function today(){return new Date().toISOString().split('T')[0]}
function thisMonth(){const d=new Date();return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))}
function persist(){localStorage.setItem('mo_deps',JSON.stringify(DEPS));localStorage.setItem('mo_tasks',JSON.stringify(TASKS));localStorage.setItem('mo_cfg',JSON.stringify(CFG))}

// ══ THEME ══
function setTheme(th){CURTH=th;CFG.theme=th;document.documentElement.setAttribute('data-theme',th);persist();updTC();closeS()}
function updTC(){document.querySelectorAll('.tcard').forEach(c=>c.classList.toggle('sel',c.dataset.th===CURTH))}
setTheme(CURTH);

// ══ TOAST ══
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2500)}

// ══ NAV ══
function goPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('act'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('pg-'+name).classList.add('act');
  if(btn)btn.classList.add('act');
  if(name==='dashboard')renderDash();
  else if(name==='budget'){renderBudget();}
  else if(name==='taches'){renderTaskFilters();renderTaches();}
  else if(name==='stats')renderStats();
}

// ══ SETTINGS ══
function openS(){
  document.getElementById('st_rev').value=CFG.rev||'';
  document.getElementById('st_sav').value=CFG.sav||'';
  document.getElementById('st_nom').value=CFG.nom||'';
  document.getElementById('st_cur').value=CFG.cur||'Ar';
  updTC();
  document.getElementById('settModal').classList.add('open');
}
function closeS(){document.getElementById('settModal').classList.remove('open')}
function saveS(){
  CFG.rev=parseInt(document.getElementById('st_rev').value)||0;
  CFG.sav=parseInt(document.getElementById('st_sav').value)||0;
  CFG.nom=document.getElementById('st_nom').value||'Mon Outil';
  CFG.cur=document.getElementById('st_cur').value||'Ar';
  document.getElementById('logo-sub').textContent=CFG.nom;
  persist();closeS();
  const ap=document.querySelector('.page.act');
  if(ap)goPage(ap.id.replace('pg-',''),null);
  toast('Paramètres enregistrés ✓');
}
function resetAll(){if(!confirm('Effacer toutes les données ?'))return;DEPS=[];TASKS=[];CFG={rev:0,sav:0,nom:'Mon Outil',cur:'Ar',theme:CURTH};persist();renderDash();toast('Données effacées')}
document.getElementById('settModal').addEventListener('click',function(e){if(e.target===this)closeS()})

// ══ COMPUTED ══
function depsThisMonth(){return DEPS.filter(d=>d.date&&d.date.startsWith(thisMonth()))}
function totalDep(){return depsThisMonth().filter(d=>d.type==='dep').reduce((s,d)=>s+(d.amt||0),0)}
function totalRev(){const manualRev=depsThisMonth().filter(d=>d.type==='rev').reduce((s,d)=>s+(d.amt||0),0);return (CFG.rev||0)+manualRev}
function solde(){return totalRev()-totalDep()}
function tasksDone(){return TASKS.filter(t=>t.done).length}
function tasksTotal(){return TASKS.length}
function tasksLate(){const td=today();return TASKS.filter(t=>!t.done&&t.due&&t.due<td).length}
function catBreakdown(){
  const cats={};
  depsThisMonth().filter(d=>d.type==='dep').forEach(d=>{if(!cats[d.cat])cats[d.cat]=0;cats[d.cat]+=d.amt||0;});
  return Object.entries(cats).sort((a,b)=>b[1]-a[1]);
}

// ══ DASHBOARD ══
function renderDash(){
  const d=new Date();
  document.getElementById('dash-date').textContent=DN[d.getDay()]+' '+d.getDate()+' '+MNL[d.getMonth()]+' '+d.getFullYear();
  const dep=totalDep(),rev=totalRev(),sol=solde();
  const pctBud=rev>0?Math.min(100,Math.round((dep/rev)*100)):0;
  const pctSav=CFG.sav>0?Math.min(100,Math.round((sol/CFG.sav)*100)):0;
  const pctTask=tasksTotal()>0?Math.round((tasksDone()/tasksTotal())*100):0;
  const cats=catBreakdown();
  const lastDeps=DEPS.filter(d2=>d2.type==='dep').slice(-5).reverse();

  let h='';

  // KPIs
  h+=`<div class="krow k4">
    <div class="kpi kg"><div class="kv ok">${fmtC(rev)}</div><div class="kk">Revenus mois</div></div>
    <div class="kpi kr"><div class="kv bad">${fmtC(dep)}</div><div class="kk">Dépenses mois</div></div>
    <div class="kpi ${sol>=0?'kg':'kr'}"><div class="kv ${sol>=0?'ok':'bad'}">${fmtC(Math.abs(sol))}</div><div class="kk">Solde ${sol<0?'déficit':''}</div></div>
    <div class="kpi kb"><div class="kv gld">${tasksDone()}/${tasksTotal()}</div><div class="kk">Tâches terminées</div></div>
  </div>`;

  // Progress bars
  h+=`<div class="card l-g">
    <div class="ctop"><div class="ctitle"><span class="ci ci-P">📊</span>Vue d'ensemble du mois</div><span style="font-size:.62rem;color:var(--t2)">${MNL[d.getMonth()]}</span></div>
    <div class="pw"><div class="pm"><span>Budget consommé</span><span style="${pctBud>90?'color:var(--R)':''}">${pctBud}%</span></div><div class="pt"><div class="pf ${pctBud>90?'pf-R':'pf-g'}" style="width:${pctBud}%"></div></div></div>
    <div class="pw"><div class="pm"><span>Objectif épargne</span><span>${pctSav}%</span></div><div class="pt"><div class="pf pf-G" style="width:${pctSav}%"></div></div></div>
    <div class="pw"><div class="pm"><span>Tâches complétées</span><span>${pctTask}%</span></div><div class="pt"><div class="pf pf-B" style="width:${pctTask}%"></div></div></div>
  </div>`;

  // Alertes
  if(tasksLate()>0||pctBud>90){
    h+=`<div class="card l-R"><div class="ctop"><div class="ctitle"><span class="ci ci-R">⚠️</span>Alertes</div></div>`;
    if(pctBud>90)h+=`<div class="sr"><span>💸 Budget presque épuisé</span><span class="sv bad">${pctBud}% utilisé</span></div>`;
    if(tasksLate()>0)h+=`<div class="sr"><span>⏰ Tâches en retard</span><span class="sv bad">${tasksLate()} tâche${tasksLate()>1?'s':''}</span></div>`;
    h+=`</div>`;
  }

  // Top catégories dépenses
  if(cats.length>0){
    h+=`<div class="card l-B"><div class="ctop"><div class="ctitle"><span class="ci ci-B">🏷</span>Top dépenses</div><span style="font-size:.62rem;color:var(--t2)">ce mois</span></div>`;
    cats.slice(0,5).forEach(([cat,amt])=>{
      const pct=dep>0?Math.round((amt/dep)*100):0;
      const col=CAT_COLORS[cat]||'var(--gold)';
      h+=`<div class="chart-bar-wrap"><div class="chart-bar-lbl">${cat.split(' ')[0]}</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="chart-bar-val">${fmtC(amt)}</div></div>`;
    });
    h+=`</div>`;
  }

  // Dernières dépenses
  h+=`<div class="card l-g"><div class="ctop"><div class="ctitle"><span class="ci ci-g">💸</span>Dernières dépenses</div><button class="btn btno btnxs" onclick="goPage('budget',document.querySelectorAll('.nb')[1])">Voir tout</button></div>`;
  if(lastDeps.length===0){
    h+=`<div class="empty"><div class="eico">💸</div><p>Aucune dépense enregistrée</p></div>`;
  } else {
    lastDeps.forEach(d2=>{
      const col=CAT_COLORS[d2.cat]||'var(--gold)';
      h+=`<div class="dep-item">
        <div class="dep-ico" style="background:${col}22">${d2.cat.split(' ')[0]}</div>
        <div class="dep-body"><div class="dep-name">${escH(d2.name)}</div><div class="dep-cat">${d2.cat} · ${d2.date}</div></div>
        <div class="dep-amt neg">− ${fmtC(d2.amt)}</div>
      </div>`;
    });
  }
  h+=`</div>`;

  // Tâches urgentes
  const urgTasks=TASKS.filter(t=>!t.done&&(t.prio==='haute'||t.due<=today())).slice(0,4);
  h+=`<div class="card l-P"><div class="ctop"><div class="ctitle"><span class="ci ci-P">🔴</span>Tâches prioritaires</div><button class="btn btno btnxs" onclick="goPage('taches',document.querySelectorAll('.nb')[2])">Voir tout</button></div>`;
  if(urgTasks.length===0){
    h+=`<div class="empty"><div class="eico">✅</div><p>Aucune tâche urgente — bravo !</p></div>`;
  } else {
    urgTasks.forEach((t,i)=>{
      const late=t.due&&t.due<today();
      h+=`<div class="titem">
        <div class="tchk ${t.prio==='haute'?'prio':''} ${t.done?'on':''}" onclick="togTaskDash('${t.id}')">✓</div>
        <div class="tbody">
          <div class="tname ${t.done?'dn':''}">${escH(t.name)}</div>
          <div class="tmeta">
            <span class="ttag ${prioTag(t.prio)}">${t.prio}</span>
            <span class="ttag tw">${t.cat.split(' ')[0]}</span>
            ${t.due?`<span class="tdue ${late?'late':''}">📅 ${t.due}</span>`:''}
          </div>
        </div>
        <button class="btn btno btnxs" onclick="rmTaskById('${t.id}')">✕</button>
      </div>`;
    });
  }
  h+=`</div>`;

  // Épargne bloc
  if(CFG.sav>0){
    h+=`<div class="savblk"><h4>💾 Épargne</h4>
    <div class="savg">
      <div class="sgi"><div class="sgv">${fmtC(CFG.sav)}</div><div class="sgk">Objectif / mois</div></div>
      <div class="sgi"><div class="sgv">${fmtC(Math.max(0,sol))}</div><div class="sgk">Disponible</div></div>
      <div class="sgi"><div class="sgv">${pctSav}%</div><div class="sgk">Avancement</div></div>
      <div class="sgi"><div class="sgv">${fmtC(Math.max(0,CFG.sav-sol))}</div><div class="sgk">Reste à mettre</div></div>
    </div></div>`;
  }

  document.getElementById('dash-content').innerHTML=h;
}

// ══ BUDGET ══
function setBudTab(tab,btn){
  BUD_TAB=tab;
  document.querySelectorAll('#pg-budget .stab').forEach(b=>b.classList.remove('act'));
  if(btn)btn.classList.add('act');
  renderBudget();
}
function renderBudget(){
  const el=document.getElementById('budget-content');
  if(!el)return;
  if(BUD_TAB==='liste')renderBudListe(el);
  else if(BUD_TAB==='categories')renderBudCats(el);
  else renderBudMensuel(el);
}

function renderBudListe(el){
  const all=[...DEPS].reverse();
  let h='';
  if(all.length===0){
    h=`<div class="empty"><div class="eico">💸</div><p>Aucune transaction.<br>Cliquez sur <strong>+ Transaction</strong> pour commencer.</p></div>`;
    el.innerHTML=h;return;
  }
  // Group by date
  const groups={};
  all.forEach(d=>{if(!groups[d.date])groups[d.date]=[];groups[d.date].push(d);});
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const dayDeps=groups[date];
    const dayTotal=dayDeps.reduce((s,d)=>s+(d.type==='dep'?-d.amt:d.amt),0);
    h+=`<div class="ml">${date} <span class="sv ${dayTotal>=0?'gld':'bad'}">${dayTotal>=0?'+':'−'}${fmt(Math.abs(dayTotal))} ${cur()}</span></div>`;
    h+=`<div class="card" style="padding:6px 12px;margin-bottom:8px">`;
    dayDeps.forEach(d=>{
      const col=CAT_COLORS[d.cat]||'var(--gold)';
      h+=`<div class="dep-item">
        <div class="dep-ico" style="background:${col}22">${d.cat.split(' ')[0]}</div>
        <div class="dep-body"><div class="dep-name">${escH(d.name)}</div><div class="dep-cat">${d.cat}${d.note?` · ${escH(d.note)}`:''}</div></div>
        <div class="dep-amt ${d.type==='dep'?'neg':'pos'}">${d.type==='dep'?'−':'+'}${fmtC(d.amt)}</div>
        <button class="btn btnxs" style="background:transparent;border:none;color:var(--t3);font-size:.8rem;cursor:pointer" onclick="rmDep('${d.id}')">✕</button>
      </div>`;
    });
    h+=`</div>`;
  });

  const dep=totalDep(),rev=totalRev(),sol=solde();
  h=`<div class="krow k3">
    <div class="kpi kg"><div class="kv ok">${fmtC(rev)}</div><div class="kk">Revenus</div></div>
    <div class="kpi kr"><div class="kv bad">${fmtC(dep)}</div><div class="kk">Dépenses</div></div>
    <div class="kpi ${sol>=0?'kg':'kr'}"><div class="kv ${sol>=0?'ok':'bad'}">${fmtC(Math.abs(sol))}</div><div class="kk">Solde</div></div>
  </div>`+h;
  el.innerHTML=h;
}

function renderBudCats(el){
  const cats=catBreakdown();
  const dep=totalDep();
  let h='';
  if(cats.length===0){
    h=`<div class="empty"><div class="eico">🏷</div><p>Aucune dépense ce mois.</p></div>`;
    el.innerHTML=h;return;
  }
  h+=`<div class="card l-g"><div class="ctop"><div class="ctitle"><span class="ci ci-g">🏷</span>Répartition par catégorie</div><span style="font-size:.62rem;color:var(--t2)">${MNL[new Date().getMonth()]}</span></div>`;
  cats.forEach(([cat,amt])=>{
    const pct=dep>0?Math.round((amt/dep)*100):0;
    const col=CAT_COLORS[cat]||'var(--gold)';
    h+=`<div class="chart-bar-wrap" style="padding:6px 0">
      <div class="chart-bar-lbl" style="width:90px;font-size:.68rem">${cat}</div>
      <div class="chart-bar-track" style="height:10px"><div class="chart-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="chart-bar-val" style="width:80px">${pct}% · ${fmtC(amt)}</div>
    </div>`;
  });
  h+=`<div class="tbox tb-R"><span class="tbl">Total dépensé</span><span class="tbv">${fmtC(dep)}</span></div>`;
  h+=`</div>`;

  // Detail list per cat
  cats.forEach(([cat,amt])=>{
    const col=CAT_COLORS[cat]||'var(--gold)';
    const items=depsThisMonth().filter(d=>d.type==='dep'&&d.cat===cat);
    h+=`<div class="card" style="border-left:3px solid ${col};padding:10px 13px;margin-bottom:8px">
      <div class="ctop" style="margin-bottom:6px">
        <div class="ctitle">${cat}</div>
        <span class="sv" style="color:${col}">${fmtC(amt)}</span>
      </div>`;
    items.forEach(d=>{
      h+=`<div class="dep-item" style="padding:4px 0">
        <div class="dep-body"><div class="dep-name" style="font-size:.74rem">${escH(d.name)}</div><div class="dep-cat">${d.date}</div></div>
        <div class="dep-amt neg" style="font-size:.72rem">−${fmtC(d.amt)}</div>
      </div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

function renderBudMensuel(el){
  const months={};
  DEPS.forEach(d=>{
    const m=d.date?d.date.slice(0,7):'?';
    if(!months[m])months[m]={dep:0,rev:0};
    if(d.type==='dep')months[m].dep+=d.amt||0;
    else months[m].rev+=d.amt||0;
  });
  const sorted=Object.keys(months).sort((a,b)=>b.localeCompare(a));
  let h='';
  if(sorted.length===0){
    h=`<div class="empty"><div class="eico">🗓</div><p>Aucune donnée mensuelle.</p></div>`;
    el.innerHTML=h;return;
  }
  h+=`<div class="card l-B"><div class="ctop"><div class="ctitle"><span class="ci ci-B">🗓</span>Historique mensuel</div></div>`;
  sorted.forEach(m=>{
    const {dep,rev}=months[m];
    const sol=rev-dep;
    const [y,mo]=m.split('-');
    h+=`<div class="sr">
      <span>${MNL[parseInt(mo)-1]} ${y}</span>
      <span style="display:flex;gap:10px">
        <span class="sv bad">−${fmtC(dep)}</span>
        <span class="sv ok">+${fmtC(rev)}</span>
        <span class="sv ${sol>=0?'gld':'bad'}">${sol>=0?'='+fmtC(sol):'−'+fmtC(Math.abs(sol))}</span>
      </span>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

// ══ DEP MODAL ══
function openDep(){
  document.getElementById('dep-date').value=today();
  document.getElementById('dep-name').value='';
  document.getElementById('dep-amt').value='';
  document.getElementById('dep-note').value='';
  document.getElementById('depModal').classList.add('open');
}
function closeDep(){document.getElementById('depModal').classList.remove('open')}
function updDepType(){const t=document.getElementById('dep-type').value;document.getElementById('dep-modal-title').textContent=t==='dep'?'➕ Nouvelle dépense':'💰 Nouveau revenu'}
function saveDep(){
  const name=document.getElementById('dep-name').value.trim();
  const amt=parseFloat(document.getElementById('dep-amt').value)||0;
  if(!name||!amt){toast('⚠️ Nom et montant requis');return;}
  const dep={id:'d'+Date.now(),name,amt,type:document.getElementById('dep-type').value,cat:document.getElementById('dep-cat').value,date:document.getElementById('dep-date').value||today(),note:document.getElementById('dep-note').value.trim()};
  DEPS.push(dep);persist();closeDep();renderBudget();renderDash();toast('Transaction ajoutée ✓');
}
function rmDep(id){DEPS=DEPS.filter(d=>d.id!==id);persist();renderBudget();renderDash();toast('Supprimé')}
document.getElementById('depModal').addEventListener('click',function(e){if(e.target===this)closeDep()})

// ══ TASKS ══
function prioTag(p){return p==='haute'?'tu':p==='moyenne'?'tw':'tp'}
function setTaskTab(tab,btn){
  TASK_TAB=tab;
  document.querySelectorAll('#pg-taches .stab').forEach(b=>b.classList.remove('act'));
  if(btn)btn.classList.add('act');
  renderTaches();
}
function renderTaskFilters(){
  const cats=['Toutes',...new Set(TASKS.map(t=>t.cat))];
  document.getElementById('task-filter-row').innerHTML=cats.map(c=>`<button class="fpill ${TASK_CAT_FILTER===c?'act':''}" onclick="setTaskCat('${c}',this)">${c.split(' ')[0]} ${c.split(' ').slice(1).join(' ')}</button>`).join('');
}
function setTaskCat(c,btn){TASK_CAT_FILTER=c;document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('act'));btn.classList.add('act');renderTaches()}

function renderTaches(){
  const el=document.getElementById('taches-content');if(!el)return;
  let list=[...TASKS];
  if(TASK_TAB==='encours')list=list.filter(t=>!t.done);
  else if(TASK_TAB==='terminees')list=list.filter(t=>t.done);
  if(TASK_CAT_FILTER!=='Toutes')list=list.filter(t=>t.cat===TASK_CAT_FILTER);
  list.sort((a,b)=>{const po={haute:0,moyenne:1,basse:2};return po[a.prio]-po[b.prio]});

  if(list.length===0){
    el.innerHTML=`<div class="empty"><div class="eico">✅</div><p>Aucune tâche ici.</p></div>`;return;
  }

  let h='';
  const groups={haute:[],moyenne:[],basse:[]};
  list.forEach(t=>groups[t.prio]&&groups[t.prio].push(t));

  const groupLabels={haute:'🔴 Priorité haute',moyenne:'🟡 Priorité moyenne',basse:'🟢 Priorité basse'};
  ['haute','moyenne','basse'].forEach(prio=>{
    if(!groups[prio]||!groups[prio].length)return;
    h+=`<div class="ml">${groupLabels[prio]}</div>`;
    h+=`<div class="card" style="padding:6px 12px;margin-bottom:10px">`;
    groups[prio].forEach(t=>{
      const late=t.due&&!t.done&&t.due<today();
      h+=`<div class="titem">
        <div class="pdot pdot-${prio==='haute'?'R':prio==='moyenne'?'g':'G'}"></div>
        <div class="tchk ${prio==='haute'?'prio':''} ${t.done?'on':''}" onclick="togTask('${t.id}')">✓</div>
        <div class="tbody">
          <div class="tname ${t.done?'dn':''}">${escH(t.name)}</div>
          ${t.desc?`<div style="font-size:.68rem;color:var(--t2);margin-top:2px">${escH(t.desc)}</div>`:''}
          <div class="tmeta">
            <span class="ttag ${prioTag(prio)}">${prio}</span>
            <span class="ttag tw">${t.cat}</span>
            ${t.proj?`<span class="ttag tb">${t.proj}</span>`:''}
            ${t.due?`<span class="tdue ${late?'late':''}">📅 ${t.due}${late?' ⚠️':''}</span>`:''}
          </div>
        </div>
        <button class="btn btno btnxs" onclick="rmTaskById('${t.id}')">✕</button>
      </div>`;
    });
    h+=`</div>`;
  });

  const done=list.filter(t=>t.done).length,total=list.length;
  const pct=total>0?Math.round((done/total)*100):0;
  h=`<div class="pw"><div class="pm"><span>Progression</span><span>${pct}%</span></div><div class="pt"><div class="pf pf-B" style="width:${pct}%"></div></div></div>`+h;
  el.innerHTML=h;
}

function openTask(){
  document.getElementById('task-name').value='';
  document.getElementById('task-desc').value='';
  document.getElementById('task-due').value='';
  document.getElementById('task-proj').value='';
  document.getElementById('taskModal').classList.add('open');
}
function closeTask(){document.getElementById('taskModal').classList.remove('open')}
function saveTask(){
  const name=document.getElementById('task-name').value.trim();
  if(!name){toast('⚠️ Titre requis');return;}
  const task={id:'t'+Date.now(),name,cat:document.getElementById('task-cat').value,prio:document.getElementById('task-prio').value,due:document.getElementById('task-due').value,proj:document.getElementById('task-proj').value.trim(),desc:document.getElementById('task-desc').value.trim(),done:false,created:today()};
  TASKS.unshift(task);persist();closeTask();renderTaskFilters();renderTaches();renderDash();toast('Tâche ajoutée ✓');
}
function togTask(id){const t=TASKS.find(t=>t.id===id);if(t){t.done=!t.done;persist();renderTaches();renderDash();}}
function togTaskDash(id){const t=TASKS.find(t=>t.id===id);if(t){t.done=!t.done;persist();renderDash();}}
function rmTaskById(id){TASKS=TASKS.filter(t=>t.id!==id);persist();renderTaskFilters();renderTaches();renderDash();toast('Tâche supprimée')}
document.getElementById('taskModal').addEventListener('click',function(e){if(e.target===this)closeTask()})

// ══ STATS ══
function renderStats(){
  const el=document.getElementById('stats-content');if(!el)return;
  document.getElementById('stats-period').textContent=MNL[new Date().getMonth()]+' '+new Date().getFullYear();
  const dep=totalDep(),rev=totalRev(),sol=solde();
  const done=tasksDone(),total=tasksTotal(),late=tasksLate();
  const cats=catBreakdown();
  const pctBud=rev>0?Math.min(100,Math.round((dep/rev)*100)):0;

  let h='';
  h+=`<div class="krow k4">
    <div class="kpi kg"><div class="kv ok">${fmtC(rev)}</div><div class="kk">Revenus</div></div>
    <div class="kpi kr"><div class="kv bad">${fmtC(dep)}</div><div class="kk">Dépenses</div></div>
    <div class="kpi ${sol>=0?'':'kr'}"><div class="kv ${sol>=0?'gld':'bad'}">${fmtC(sol)}</div><div class="kk">Solde</div></div>
    <div class="kpi kb"><div class="kv">${DEPS.length}</div><div class="kk">Transactions</div></div>
  </div>`;

  h+=`<div class="pw"><div class="pm"><span>Budget consommé</span><span style="${pctBud>90?'color:var(--R)':''}">${pctBud}%</span></div><div class="pt"><div class="pf ${pctBud>90?'pf-R':'pf-g'}" style="width:${pctBud}%"></div></div></div>`;

  // Budget vs dépenses
  h+=`<div class="card l-g"><div class="ctop"><div class="ctitle"><span class="ci ci-g">📊</span>Budget vs Dépenses</div></div>
    <div class="sr"><span>Revenus déclarés</span><span class="sv ok">${fmtC(CFG.rev)}</span></div>
    <div class="sr"><span>Revenus additionnels</span><span class="sv ok">+${fmtC(depsThisMonth().filter(d=>d.type==='rev').reduce((s,d)=>s+d.amt,0))}</span></div>
    <div class="sr"><span>Total dépensé</span><span class="sv bad">−${fmtC(dep)}</span></div>
    <div class="sr"><span>Objectif épargne</span><span class="sv">${fmtC(CFG.sav)}</span></div>
    <div class="tbox ${sol>=0?'tb-G':'tb-R'}"><span class="tbl">Solde final</span><span class="${sol>=0?'vok':'vbad'}">${fmtC(sol)}</span></div>
  </div>`;

  // Tasks stats
  h+=`<div class="card l-B"><div class="ctop"><div class="ctitle"><span class="ci ci-B">✅</span>Statistiques tâches</div></div>
    <div class="sr"><span>Total tâches</span><span class="sv">${total}</span></div>
    <div class="sr"><span>Terminées</span><span class="sv ok">${done}</span></div>
    <div class="sr"><span>En cours</span><span class="sv gld">${total-done}</span></div>
    <div class="sr"><span>En retard</span><span class="sv ${late>0?'bad':''}">${late}</span></div>
    <div class="sr"><span>Taux de complétion</span><span class="sv ${done/total>=.7?'ok':''}">${total>0?Math.round((done/total)*100):0}%</span></div>
    <div class="pw" style="margin-top:8px"><div class="pm"><span>Complétion</span><span>${total>0?Math.round((done/total)*100):0}%</span></div><div class="pt"><div class="pf pf-B" style="width:${total>0?Math.round((done/total)*100):0}%"></div></div></div>
  </div>`;

  // Cats stats
  if(cats.length>0){
    h+=`<div class="card l-P"><div class="ctop"><div class="ctitle"><span class="ci ci-P">🏷</span>Dépenses par catégorie</div></div>`;
    cats.forEach(([cat,amt])=>{
      const pct=dep>0?Math.round((amt/dep)*100):0;
      const col=CAT_COLORS[cat]||'var(--gold)';
      h+=`<div class="chart-bar-wrap" style="padding:5px 0">
        <div class="chart-bar-lbl" style="width:85px">${cat}</div>
        <div class="chart-bar-track" style="height:9px"><div class="chart-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="chart-bar-val" style="width:90px">${pct}% · ${fmtC(amt)}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  el.innerHTML=h;
}
